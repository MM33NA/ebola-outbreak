name: Daily data update

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests cloudscraper pytrends google-genai
      - name: Debug secrets
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "GEMINI_API_KEY is NOT set"
          else
            echo "GEMINI_API_KEY is set (length: ${#GEMINI_API_KEY})"
          fi
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Run Scraper
        run: python scrape.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          
      - name: Run Scraper
        run: python scrape.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      # Added trends.py execution right after the CDC numbers update
      - name: Run Google Trends Scraper
        run: python trends.py

      # Stdlib-only (no extra pip installs needed) - computes CFR trend,
      # growth rate/doubling time, and search-interest correlation from
      # whatever scrape.py and trends.py just wrote. Runs after both since
      # it reads their output.
      - name: Run Outbreak Trajectory Analysis
        run: python analysis.py

      - name: Commit updated data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "Auto-update: outbreak, trends, and trajectory analysis data $(date +'%Y-%m-%d')"

      - name: Push changes
        run: git push origin main