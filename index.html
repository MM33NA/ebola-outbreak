    .metric-sub { font-size: 11px; color: var(--text-3); margin-top: 3px; }
    .section-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 0.75rem; }
    .section-sub { font-size: 13px; color: var(--text-2); margin-bottom: 1rem; line-height: 1.6; }
    .section-divider { border: none; border-top: 0.5px solid var(--border); margin: 2rem 0; }

    .toggle-group { display: flex; background: var(--bg-2); border: 0.5px solid var(--border); border-radius: var(--radius-md); overflow: hidden; }
    .toggle-btn { font-size: 12px; padding: 5px 12px; border: none; background: transparent; color: var(--text-2); cursor: pointer; transition: background 0.15s, color 0.15s; }
    .toggle-btn.active { background: var(--blue); color: #fff; }

    .legend { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 10px; font-size: 12px; color: var(--text-2); }
    .legend-item { display: flex; align-items: center; gap: 5px; }

    .chart-wrap { position: relative; width: 100%; height: 300px; margin-bottom: 1.75rem; }

    .graph-card { background: var(--bg-2); border-radius: 12px; overflow: hidden; margin-bottom: 1.5rem; }
    #graph-svg { width: 100%; display: block; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 1.75rem; }
    th { text-align: left; font-size: 11px; font-weight: 500; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.05em; padding: 6px 10px; border-bottom: 0.5px solid var(--border); }

<main class="page">
  <div id="app"><div class="loading">Loading outbreak data…</div></div>

<script>
// ─── Module-level state ───────────────────────────────────────────────────────
let chartInstance  = null;
let currentMode    = 'cumulative';
let chartTimeline  = [];

// ─── Word cloud ───────────────────────────────────────────────────────────────
function updateWordCloudView(selectedDate) {
  const cloudContainer = document.getElementById('symptom-word-cloud');
  if (!cloudContainer) return;

  if (!window.ebolaData || !window.ebolaData.google_trends || !window.ebolaData.google_trends.word_cloud) {
    cloudContainer.innerHTML = `<p style="color:var(--text-3);font-size:13px;padding:20px;text-align:center;">
      No word-cloud data available. Run trends.py to populate search logs.
    </p>`;
    return;
  }

  const targetCloud = window.ebolaData.google_trends.word_cloud;
  let rawWordsObject = {};
  if (selectedDate === 'all' || !selectedDate) {
    rawWordsObject = targetCloud.all_time || {};
  } else {
    if (targetCloud.daily_history) {
      // Print out the actual dictionary keys to your browser console to see what exists!
      console.log("🔍 Available keys in daily_history:", Object.keys(targetCloud.daily_history));
      console.log("👉 Key you are trying to find right now:", selectedDate);

      // 1. Try direct matching (e.g., "2026-05-24")
      if (targetCloud.daily_history[selectedDate]) {
        rawWordsObject = targetCloud.daily_history[selectedDate];
      } 
      // 2. Fallback: If your keys match the exact text label inside the option tag instead
      else {
        // Try getting the active text name from the select dropdown directly
        const selectEl = document.getElementById('word-cloud-period-select');
        const selectedText = selectEl ? selectEl.options[selectEl.selectedIndex].text : '';
        
        console.log("🔄 Trying fallback option text matching for:", selectedText);
        
        if (targetCloud.daily_history[selectedText]) {
          rawWordsObject = targetCloud.daily_history[selectedText];
        } else {
          rawWordsObject = {};
        }
      }
    }
  }
  
  cloudContainer.innerHTML = '';

  const colors = [
    '#1f77b4','#aec7e8','#ff7f0e','#ffbb78','#2ca02c',
    '#98df8a','#d62728','#ff9896','#9467bd','#c5b0d5',
    '#8c564b','#e377c2','#f7b6d2','#bcbd22','#17becf'
  ];

  const dataset = Object.entries(rawWordsObject).map(([word, frequency]) => ({ term: word, volume: frequency }));
  const maxVol  = Math.max(...dataset.map(v => v.volume));
  const minVol  = Math.min(...dataset.map(v => v.volume));

  const width   = cloudContainer.offsetWidth || 600;
  const height  = 320;
  const centerX = width  / 2;
  const centerY = height / 2;
  const placed  = [];

  function intersects(x1, y1, w1, h1) {
    for (const ex of placed) {
      if (x1 < ex.x2 && x1 + w1 > ex.x1 && y1 < ex.y2 && y1 + h1 > ex.y1) return true;
    }
    return false;
  }

  [...dataset].sort((a, b) => b.volume - a.volume).forEach((item, idx) => {
    const scalePct = maxVol === minVol ? 0.5 : (item.volume - minVol) / (maxVol - minVol);
    const fontSize = Math.round(12 + scalePct * 28);

    const span = document.createElement('span');
    span.className   = 'cloud-word';
    span.style.fontSize = `${fontSize}px`;
    span.style.color    = colors[idx % colors.length];
    span.style.position = 'absolute';  // <--- Force absolute immediately
    span.textContent    = item.term;
    span.title          = `Relative Search Weight Index: ${item.volume}`;
    
    // We must append it to the DOM first so the browser layout engine calculates offsetWidth/Height
    cloudContainer.appendChild(span);

    const ww = span.offsetWidth || (item.term.length * fontSize * 0.6); // Fallback estimate if 0
    const wh = span.offsetHeight || (fontSize * 1.2);                   // Fallback estimate if 0

    let angle = 0, radius = 0, posX = 0, posY = 0, ok = false;
    
    // Give the spiral plenty of room to expand outwards
    while (!ok && radius < Math.max(width, height) * 2) {
      posX = centerX + radius * Math.cos(angle) - ww / 2;
      posY = centerY + radius * Math.sin(angle) - wh / 2;
      
      if (posX > 0 && posX + ww < width && posY > 0 && posY + wh < height) {
        if (!intersects(posX, posY, ww, wh)) {
          placed.push({ x1: posX, y1: posY, x2: posX + ww, y2: posY + wh });
          ok = true;
        }
      }
      angle  += 0.1; // Tighter spiral angles for better compactness
      radius += 0.1;
    }

    if (ok) {
      span.style.left = `${posX}px`;
      span.style.top  = `${posY}px`;
      // Remove any translation modifications that fight with explicit coordinates
      span.style.transform = 'none'; 
    } else {
      // If it absolutely won't fit, hide it or place it randomly as a fallback instead of removing it
      span.style.left = `${Math.random() * (width - ww)}px`;
      span.style.top  = `${Math.random() * (height - wh)}px`;
    }
  });
}

// ─── Chart helpers ────────────────────────────────────────────────────────────
function buildDailyData(timeline) {
  return timeline.map((pt, i) => ({
    date:   pt.date,
    cases:  i === 0 ? pt.cases  : Math.max(0, pt.cases  - timeline[i - 1].cases),
    deaths: i === 0 ? pt.deaths : Math.max(0, pt.deaths - timeline[i - 1].deaths),
  }));
}

function switchMode(mode) {
  currentMode = mode;
  document.getElementById('btn-cumulative').classList.toggle('active', mode === 'cumulative');
  document.getElementById('btn-daily').classList.toggle('active', mode === 'daily');
  renderChart(mode);
}

function renderChart(mode) {
  if (!chartTimeline || chartTimeline.length === 0) {
    console.warn('renderChart called before chartTimeline was populated.');
    return;
  }

  const canvas = document.getElementById('mainChart');
  if (!canvas) { console.warn('mainChart canvas not found.'); return; }

  const isDark  = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const source  = mode === 'cumulative' ? chartTimeline : buildDailyData(chartTimeline);
  const display = mode === 'daily' ? source.slice(1) : source;

  const config = {
    type: mode === 'daily' ? 'bar' : 'line',
    data: {
      labels: display.map(d => d.date),
      datasets: [
        {
          label: mode === 'cumulative' ? 'Confirmed cases' : 'New confirmed cases',
          data: display.map(d => d.cases),
          borderColor: '#378ADD',
          backgroundColor: mode === 'daily' ? 'rgba(55,138,221,0.7)' : (isDark ? 'rgba(55,138,221,0.12)' : 'rgba(55,138,221,0.08)'),
          fill: mode !== 'daily',
          tension: 0.35,
          pointRadius: mode === 'daily' ? 0 : 5,
          pointBackgroundColor: '#378ADD',
          pointBorderColor: isDark ? '#1c1c1a' : '#fff',
          pointBorderWidth: 2,
          borderWidth: 2,
          borderRadius: mode === 'daily' ? 4 : 0,
          order: 1,
        },
        {
          label: mode === 'cumulative' ? 'Confirmed deaths' : 'New confirmed deaths',
          data: display.map(d => d.deaths),
          borderColor: '#E24B4A',
          backgroundColor: mode === 'daily' ? 'rgba(226,75,74,0.75)' : (isDark ? 'rgba(226,75,74,0.10)' : 'rgba(226,75,74,0.06)'),
          fill: mode !== 'daily',
          tension: 0.35,
          pointRadius: mode === 'daily' ? 0 : 5,
          pointBackgroundColor: '#E24B4A',
          pointBorderColor: isDark ? '#1c1c1a' : '#fff',
          pointBorderWidth: 2,
          borderWidth: 2,
          borderDash: mode === 'daily' ? [] : [5, 3],
          borderRadius: mode === 'daily' ? 4 : 0,
          order: 2,
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y.toLocaleString()}`,
            footer: items => {
              const c = items[0]?.parsed.y, d = items[1]?.parsed.y;
              if (c && d && mode === 'cumulative') return `CFR (Confirmed): ${Math.round((d / c) * 100)}%`;
            }
          }
        }
      },
      scales: {
        x: { ticks: { color: 'var(--text-3)', maxTicksLimit: 12 }, grid: { display: false } },
        y: { ticks: { color: 'var(--text-3)' }, grid: { color: 'var(--border)' } }
      }
    }
  };

  if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
  chartInstance = new Chart(canvas, config);
}

// ─── GOOGLE TRENDS RENDERING ENGINE ──────────────────────────────────────────
function renderGoogleTrends(data) {
  // 1. Safety check to make sure the trends data block exists
  if (!data || !data.google_trends_surveillance || !data.google_trends_surveillance.search_timeline) {
      console.warn("Google Trends data matrix is currently unpopulated or missing. Skipping render step.");
      return; 
  }

  const trends = data.google_trends_surveillance;

  // 2. Safely parse tracking timeline labels
  const timeLabels = (trends.search_timeline.Ebola || []).map(item => {
      if (item.time && item.time.includes('-')) {
          const parts = item.time.split('-');
          const dateObj = new Date(parts[0], parts[1] - 1, parts[2]);
          return dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      }
      return item.time || '';
  });
    
  // 3. Set up keyword series
  const ebolaSeries = (trends.search_timeline.Ebola || []).map(item => item.score || 0);
  const symptomsSeries = (trends.search_timeline.Symptoms || []).map(item => item.score || 0);
  const transmissionSeries = (trends.search_timeline.Transmission || []).map(item => item.score || 0);

  if (!window.ebolaData) window.ebolaData = {};
  if (!window.ebolaData.google_trends) {
      window.ebolaData.google_trends = trends;
  }

  // Define the dataset layout configuration for Chart.js
  const datasets = [
    { label: 'Ebola Searches', data: ebolaSeries, borderColor: '#f59e0b', tension: 0.1, fill: false },
    { label: 'Symptoms', data: symptomsSeries, borderColor: '#ef4444', tension: 0.1, fill: false },
    { label: 'Transmission', data: transmissionSeries, borderColor: '#3b82f6', tension: 0.1, fill: false }
  ];

  const trendsCanvas = document.getElementById('trendsChart');
  if (!trendsCanvas) return;

  new Chart(trendsCanvas.getContext('2d'), {
    type: 'line',
    data: { labels: timeLabels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          display: true, position: 'top',
          labels: { color: 'var(--text-2)', font: { size: 11 }, boxWidth: 12 }
        }
      },
      scales: {
        x: { ticks: { color: 'var(--text-3)', maxTicksLimit: 12 }, grid: { display: false } },
        y: { min: 0, max: 100, ticks: { color: 'var(--text-3)' }, grid: { color: 'var(--border)' } }
      }
    }
  });
} // <--- THIS MATCHES AND CLOSES THE RENDERGOOGLE TRENDS FUNCTION CLEANLY!

let chartTimeline = [];

// ─── 2. GOOGLE TRENDS CHART & QUERIES LIST RENDER ────────────────────────────
function renderGoogleTrends(data) {
  const trendsData = data.google_trends_surveillance;
  if (!trendsData) return;

  const queriesContainer = document.getElementById('rising-queries-list');
  if (queriesContainer) {
    if (trendsData.rising_searches && trendsData.rising_searches.length > 0) {
      let block = `<ul style="margin:0;padding-left:20px;list-style-type:square;line-height:1.8;">`;
      trendsData.rising_searches.forEach(q => {
        const displayVal = q.breakout_value === 'Breakout' ? '🔥 Breakout' : `+${q.breakout_value}%`;

// ─── DATA LOADER SYSTEM ──────────────────────────────────────────────────────
async function initDashboard() {
  try {
    // 1. Fetch fresh updated data file from localhost with a cache-buster timestamp
    const cacheBuster = new Date().getTime();
    const response = await fetch(`data.json?v=${cacheBuster}`);
    if (!response.ok) {
      throw new Error(`HTTP error! status: ${response.status}`);
    }
    
    // 2. Parse it into an object
    const data = await response.json();
    
    // 3. Normalize all timeline dates instantly on launch so charts don't load empty
    let chartTimeline = Array.isArray(data.timeline) ? data.timeline : [];
    chartTimeline = chartTimeline.map(item => {
      if (item.date && item.date.includes('-')) {
        const parts = item.date.split('-');
        const dateObj = new Date(parts[0], parts[1] - 1, parts[2]);  
        return {
          ...item,
          date: dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
        };
      }
      return item;
    });

    // 4. Save global data states cleanly so the word cloud and charts can see them
    window.ebolaData = {
      timeline: chartTimeline,
      google_trends: data.google_trends_surveillance || null
    };
    
    // 5. Run layout renderers with your live metrics!
    if (typeof renderSummary === 'function') {
      renderSummary(data);
    }
    if (typeof renderGoogleTrends === 'function') {
      renderGoogleTrends(data);
    }
    if (typeof updateWordCloudView === 'function') {
      updateWordCloudView('all');
    }
    
  } catch (error) {
      console.error("Failed to load or parse data.json:", error);
      const appContainer = document.getElementById('app');
      if (appContainer) {
        appContainer.innerHTML = `
          <div class="loading" style="color:var(--red); text-align:center; padding:40px;">
            Error loading outbreak data. Make sure data.json exists in your project folder.
          </div>`;
      }
    }
} // Closes initDashboard

// Fire up the application once the document loads
document.addEventListener('DOMContentLoaded', initDashboard);
