<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2026 Ebola Outbreak Dashboard — DRC & Uganda</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #ffffff;
      --bg-2:      #f5f5f3;
      --bg-3:      #eeecea;
      --text:      #1a1a18;
      --text-2:    #5f5e5a;
      --text-3:    #88877f;
      --border:    rgba(0,0,0,0.10);
      --border-2:  rgba(0,0,0,0.18);
      --blue:      #378ADD;
      --red:       #E24B4A;
      --amber:     #BA7517;
      --amber-bg:  #faeeda;
      --amber-bdr: #FAC775;
      --radius-md: 8px;
      --radius-lg: 12px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:        #1c1c1a;
        --bg-2:      #252523;
        --bg-3:      #2e2e2c;
        --text:      #f0efea;
        --text-2:    #b4b2a9;
        --text-3:    #888780;
        --border:    rgba(255,255,255,0.09);
        --border-2:  rgba(255,255,255,0.16);
        --amber-bg:  #412402;
        --amber-bdr: #854F0B;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .page { max-width: 900px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }

    /* Header */
    .header { margin-bottom: 1.75rem; }
    .header-eyebrow { font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-3); margin-bottom: 4px; }
    .header-title { font-size: 22px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    .header-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .badge { font-size: 11px; color: var(--text-3); background: var(--bg-2); border: 0.5px solid var(--border); border-radius: var(--radius-md); padding: 3px 9px; }
    .badge-red { color: #A32D2D; background: #FCEBEB; border-color: #F7C1C1; }
    @media (prefers-color-scheme: dark) { .badge-red { color: #F09595; background: #501313; border-color: #791F1F; } }

    /* Metrics */
    .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 1.75rem; }
    .metric { background: var(--bg-2); border-radius: var(--radius-md); padding: 1rem; }
    .metric-label { font-size: 12px; color: var(--text-2); margin-bottom: 4px; }
    .metric-value { font-size: 26px; font-weight: 600; color: var(--text); }
    .metric-value.red   { color: var(--red); }
    .metric-value.amber { color: var(--amber); }
    .metric-sub { font-size: 11px; color: var(--text-3); margin-top: 3px; }

    /* Section */
    .section-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 0.75rem; }
    .section-divider { border: none; border-top: 0.5px solid var(--border); margin: 2rem 0; }

    /* Legend (line chart) */
    .legend { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 10px; font-size: 12px; color: var(--text-2); }
    .legend-item { display: flex; align-items: center; gap: 5px; }
    .legend-swatch { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }

    /* Charts */
    .chart-wrap { position: relative; width: 100%; height: 300px; margin-bottom: 1.75rem; }

    /* Network legend */
    .net-legend { display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 1rem; }
    .net-legend-group { display: flex; flex-direction: column; gap: 5px; }
    .net-legend-title { font-size: 10px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text-3); margin-bottom: 2px; }
    .net-legend-row { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--text-2); }
    .net-legend-circle { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
    .net-legend-line { width: 22px; height: 2px; flex-shrink: 0; }

    /* Network graph card */
    .graph-card { background: var(--bg-2); border-radius: 12px; overflow: hidden; margin-bottom: 1.5rem; }
    #graph-svg { width: 100%; display: block; }

    /* Tooltip */
    #tooltip {
      position: fixed; pointer-events: none;
      background: var(--bg); border: 0.5px solid var(--border-2);
      border-radius: var(--radius-md); padding: 10px 13px;
      font-size: 12px; color: var(--text); max-width: 240px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    }
    #tooltip .tt-label { font-weight: 600; font-size: 13px; margin-bottom: 4px; }
    #tooltip .tt-country { font-size: 11px; color: var(--text-3); margin-bottom: 6px; }
    #tooltip .tt-detail { color: var(--text-2); }

    /* Table */
    table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 1.75rem; }
    th { text-align: left; font-size: 11px; font-weight: 500; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.05em; padding: 6px 10px; border-bottom: 0.5px solid var(--border); }
    td { padding: 8px 10px; color: var(--text); border-bottom: 0.5px solid var(--border); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--bg-2); }

    /* Timeline */
    .timeline { border-left: 2px solid var(--border-2); margin-left: 8px; padding-left: 16px; display: flex; flex-direction: column; gap: 16px; margin-bottom: 1.75rem; }
    .tl-item { position: relative; }
    .tl-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--border-2); position: absolute; left: -21px; top: 5px; }
    .tl-dot.red { background: var(--red); }
    .tl-date { font-size: 11px; color: var(--text-3); margin-bottom: 2px; }
    .tl-desc { font-size: 13px; color: var(--text); }

    /* Note */
    .note { background: var(--amber-bg); border: 0.5px solid var(--amber-bdr); border-radius: var(--radius-md); padding: 12px 14px; font-size: 12px; color: var(--amber); margin-bottom: 1.25rem; line-height: 1.6; }

    /* Sources */
    .sources { font-size: 12px; color: var(--text-3); margin-bottom: 0.5rem; }
    .links { display: flex; gap: 10px; flex-wrap: wrap; }
    .links a { font-size: 12px; color: var(--blue); text-decoration: none; border: 0.5px solid var(--border); border-radius: var(--radius-md); padding: 5px 10px; }
    .links a:hover { background: var(--bg-2); text-decoration: underline; }

    footer { margin-top: 3rem; padding-top: 1.25rem; border-top: 0.5px solid var(--border); font-size: 11px; color: var(--text-3); }
    .loading { text-align: center; padding: 4rem 0; color: var(--text-3); font-size: 14px; }

    @media (max-width: 500px) {
      .header-title { font-size: 18px; }
      .metric-value { font-size: 22px; }
    }
  </style>
</head>
<body>
<main class="page">
  <div id="app"><div class="loading">Loading outbreak data…</div></div>
</main>

<div id="tooltip">
  <div class="tt-label" id="tt-label"></div>
  <div class="tt-country" id="tt-country"></div>
  <div class="tt-detail" id="tt-detail"></div>
</div>

<script>
async function init() {
  let data;
  try {
    const res = await fetch('./data.json');
    if (!res.ok) throw new Error('fetch failed');
    data = await res.json();
  } catch (e) {
    document.getElementById('app').innerHTML = '<div class="loading">Could not load data.json. Make sure it is in the same folder.</div>';
    return;
  }

  const { summary, timeline, healthZones, events, network, updated } = data;
  const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

  document.getElementById('app').innerHTML = `
    <div class="header">
      <p class="header-eyebrow">Public health emergency of international concern (PHEIC)</p>
      <h1 class="header-title">2026 Ebola Outbreak — DRC &amp; Uganda</h1>
      <div class="header-meta">
        <span class="badge">Data: WHO / CDC · Updated ${updated}</span>
      </div>
    </div>

    <div class="metrics">
      <div class="metric"><p class="metric-label">Suspected cases</p><p class="metric-value">~${summary.suspectedCases.toLocaleString()}</p><p class="metric-sub">as of ${updated}</p></div>
      <div class="metric"><p class="metric-label">Suspected deaths</p><p class="metric-value red">${summary.suspectedDeaths.toLocaleString()}</p><p class="metric-sub">as of ${updated}</p></div>
      <div class="metric"><p class="metric-label">Confirmed (lab)</p><p class="metric-value">${summary.confirmedDRC}</p><p class="metric-sub">DRC + Uganda</p></div>
      <div class="metric"><p class="metric-label">Case fatality rate</p><p class="metric-value amber">~${summary.cfrPercent}%</p><p class="metric-sub">25–50% est. for Bundibugyo</p></div>
      <div class="metric"><p class="metric-label">Uganda cases</p><p class="metric-value">${summary.ugandaCases}</p><p class="metric-sub">${summary.ugandaDeaths} death · Kampala</p></div>
    </div>

    <hr class="section-divider">

    <!-- LINE CHART -->
    <p class="section-title">Outbreak progression</p>
    <div class="legend">
      <span class="legend-item"><span class="legend-swatch" style="background:#378ADD"></span>Suspected cases</span>
      <span class="legend-item"><span class="legend-swatch" style="background:#E24B4A"></span>Suspected deaths</span>
    </div>
    <div class="chart-wrap">
      <canvas id="mainChart" role="img" aria-label="Line chart showing cumulative suspected Ebola cases and deaths from April to May 2026."></canvas>
    </div>

    <hr class="section-divider">

    <!-- NETWORK CHART -->
    <p class="section-title">Transmission &amp; importation network</p>
    <p style="font-size:13px;color:var(--text-2);margin-bottom:1rem;line-height:1.6;">
      Shows confirmed case transmission chains and contact movements from the epicentre in Ituri Province, DRC. Node size reflects case count. Drag nodes to explore. Hover for details.
    </p>

    <div class="net-legend">
      <div class="net-legend-group">
        <p class="net-legend-title">Nodes</p>
        <div class="net-legend-row"><span class="net-legend-circle" style="background:#C0392B"></span>Epicentre hub (Bunia)</div>
        <div class="net-legend-row"><span class="net-legend-circle" style="background:#E24B4A"></span>Origin health zone (DRC)</div>
        <div class="net-legend-row"><span class="net-legend-circle" style="background:#E67E22"></span>Confirmed export (cases)</div>
        <div class="net-legend-row"><span class="net-legend-circle" style="background:#378ADD"></span>Contact transfer (no cases)</div>
        <div class="net-legend-row"><span class="net-legend-circle" style="background:#8E44AD"></span>Heightened screening</div>
      </div>
      <div class="net-legend-group">
        <p class="net-legend-title">Links</p>
        <div class="net-legend-row"><span class="net-legend-line" style="background:#E24B4A;height:2px;"></span>Confirmed transmission</div>
        <div class="net-legend-row"><span class="net-legend-line" style="background:repeating-linear-gradient(to right,#378ADD 0,#378ADD 4px,transparent 4px,transparent 8px);height:2px;"></span>Contact transfer</div>
        <div class="net-legend-row"><span class="net-legend-line" style="background:repeating-linear-gradient(to right,#8E44AD 0,#8E44AD 2px,transparent 2px,transparent 6px);height:2px;"></span>Alert / screening</div>
      </div>
    </div>

    <div class="graph-card">
      <svg id="graph-svg" viewBox="0 0 680 440" preserveAspectRatio="xMidYMid meet"></svg>
    </div>

    <p class="note" style="margin-bottom:1.75rem;">
      <strong>Network note:</strong> Germany and Czech Republic represent <strong>contact transfers</strong>, not confirmed Ebola cases. The United States has no confirmed cases; enhanced airport screening was implemented as a precaution. Node sizes are proportional to confirmed/suspected case counts where known.
    </p>

    <hr class="section-divider">

    <!-- TABLE -->
    <p class="section-title">Affected health zones (DRC, Ituri Province)</p>
    <table>
      <thead><tr><th>Health zone</th><th>Health areas affected</th><th>Status</th></tr></thead>
      <tbody>
        ${healthZones.map(z => `<tr><td>${z.name}</td><td>${z.areasAffected ?? '—'}</td><td>${z.status}</td></tr>`).join('')}
      </tbody>
    </table>

    <hr class="section-divider">

    <!-- TIMELINE -->
    <p class="section-title">Key events</p>
    <div class="timeline">
      ${events.map(e => `
        <div class="tl-item">
          <div class="tl-dot ${e.red ? 'red' : ''}"></div>
          <p class="tl-date">${e.date}</p>
          <p class="tl-desc">${e.desc}</p>
        </div>
      `).join('')}
    </div>

    <p class="note">
      <strong>Data caveat:</strong> All case and death figures are suspected/reported totals. The true number of infections likely considerably exceeds official estimates due to the remote location, ongoing armed conflict in Ituri, limited laboratory capacity, and high population mobility. Sources: WHO Disease Outbreak News (DON602), CDC Situation Summary, May 2026.
    </p>

    <p class="sources">Sources &amp; further reading:</p>
    <div class="links">
      <a href="https://www.who.int/emergencies/disease-outbreak-news/item/2026-DON602" target="_blank" rel="noopener">WHO Disease Outbreak News ↗</a>
      <a href="https://www.cdc.gov/ebola/situation-summary/index.html" target="_blank" rel="noopener">CDC Situation Summary ↗</a>
      <a href="https://www.cdc.gov/han/php/notices/han00530.html" target="_blank" rel="noopener">CDC Health Alert Network ↗</a>
      <a href="https://www.who.int/news/item/17-05-2026-epidemic-of-ebola-disease-in-the-democratic-republic-of-the-congo-and-uganda-determined-a-public-health-emergency-of-international-concern" target="_blank" rel="noopener">WHO PHEIC Declaration ↗</a>
    </div>

    <footer>
      Not a medical resource — consult official health authorities for guidance.
    </footer>
  `;

  // ── LINE CHART ──
  const gridColor = isDark ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.06)';
  const tickColor = isDark ? 'rgba(255,255,255,0.45)' : 'rgba(0,0,0,0.45)';

  new Chart(document.getElementById('mainChart'), {
    type: 'line',
    data: {
      labels: timeline.map(d => d.date),
      datasets: [
        {
          label: 'Suspected cases',
          data: timeline.map(d => d.cases),
          borderColor: '#378ADD',
          backgroundColor: isDark ? 'rgba(55,138,221,0.12)' : 'rgba(55,138,221,0.08)',
          fill: true, tension: 0.35, pointRadius: 5,
          pointBackgroundColor: '#378ADD',
          pointBorderColor: isDark ? '#1c1c1a' : '#ffffff',
          pointBorderWidth: 2, borderWidth: 2,
        },
        {
          label: 'Suspected deaths',
          data: timeline.map(d => d.deaths),
          borderColor: '#E24B4A',
          backgroundColor: isDark ? 'rgba(226,75,74,0.10)' : 'rgba(226,75,74,0.06)',
          fill: true, tension: 0.35, pointRadius: 5,
          pointBackgroundColor: '#E24B4A',
          pointBorderColor: isDark ? '#1c1c1a' : '#ffffff',
          pointBorderWidth: 2, borderWidth: 2, borderDash: [5, 3],
        }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y.toLocaleString()}`,
            footer: items => {
              const c = items[0]?.parsed.y, d = items[1]?.parsed.y;
              if (c && d) return `CFR: ${Math.round((d / c) * 100)}%`;
            }
          }
        }
      },
      scales: {
        x: { grid: { color: gridColor }, ticks: { color: tickColor, font: { size: 11 }, autoSkip: false } },
        y: { grid: { color: gridColor }, ticks: { color: tickColor, font: { size: 11 }, callback: v => v >= 1000 ? (v/1000)+'k' : v }, beginAtZero: true }
      }
    }
  });

// Build Network Graph
buildNetwork(network, isDark);
