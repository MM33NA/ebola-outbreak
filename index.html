<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2026 Ebola Outbreak Dashboard — DRC & Uganda</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff; --bg-2: #f5f5f3; --text: #1a1a18; --text-2: #5f5e5a;
      --text-3: #88877f; --border: rgba(0,0,0,0.10); --border-2: rgba(0,0,0,0.18);
      --blue: #378ADD; --red: #E24B4A; --amber: #BA7517;
      --amber-bg: #faeeda; --amber-bdr: #FAC775; --radius-md: 8px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1a; --bg-2: #252523; --text: #f0efea; --text-2: #b4b2a9;
        --text-3: #888780; --border: rgba(255,255,255,0.09); --border-2: rgba(255,255,255,0.16);
        --amber-bg: #412402; --amber-bdr: #854F0B;
      }
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 15px; line-height: 1.6; background: var(--bg); color: var(--text); min-height: 100vh; }
    .page { max-width: 900px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }
    .header { margin-bottom: 1.75rem; }
    .header-eyebrow { font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-3); margin-bottom: 4px; }
    .header-title { font-size: 22px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    .header-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .badge { font-size: 11px; color: var(--text-3); background: var(--bg-2); border: 0.5px solid var(--border); border-radius: var(--radius-md); padding: 3px 9px; }
    .badge-red { color: #A32D2D; background: #FCEBEB; border-color: #F7C1C1; }
    @media (prefers-color-scheme: dark) { .badge-red { color: #F09595; background: #501313; border-color: #791F1F; } }
    .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 5px; margin-bottom: 1.75rem; }
    .metric { background: var(--bg-2); border-radius: var(--radius-md); padding: 1rem; }
    .metric-label { font-size: 12px; color: var(--text-2); margin-bottom: 4px; }
    .metric-value { font-size: 26px; font-weight: 600; color: var(--text); }
    .metric-value.red { color: var(--red); }
    .metric-value.amber { color: var(--amber); }
    .metric-sub { font-size: 11px; color: var(--text-3); margin-top: 3px; }
    .section-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 0.75rem; }
    .section-sub { font-size: 13px; color: var(--text-2); margin-bottom: 1rem; line-height: 1.6; }
    .section-divider { border: none; border-top: 0.5px solid var(--border); margin: 2rem 0; }

    .chart-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
    .toggle-group { display: flex; background: var(--bg-2); border: 0.5px solid var(--border); border-radius: var(--radius-md); overflow: hidden; }
    .toggle-btn { font-size: 12px; padding: 5px 12px; border: none; background: transparent; color: var(--text-2); cursor: pointer; transition: background 0.15s, color 0.15s; }
    .toggle-btn.active { background: var(--blue); color: #fff; }

    .legend { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 10px; font-size: 12px; color: var(--text-2); }
    .legend-item { display: flex; align-items: center; gap: 5px; }
    .legend-swatch { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }
    .chart-wrap { position: relative; width: 100%; height: 300px; margin-bottom: 1.75rem; }

    .graph-card { background: var(--bg-2); border-radius: 12px; overflow: hidden; margin-bottom: 1.5rem; }
    #graph-svg { width: 100%; display: block; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 1.75rem; }
    th { text-align: left; font-size: 11px; font-weight: 500; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.05em; padding: 6px 10px; border-bottom: 0.5px solid var(--border); }
    td { padding: 7px 8px; color: var(--text); border-bottom: 0.5px solid var(--border); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--bg-2); }

    .timeline { border-left: 2px solid var(--border-2); margin-left: 8px; padding-left: 16px; display: flex; flex-direction: column; gap: 16px; margin-bottom: 1.75rem; }
    .tl-item { position: relative; }
    .tl-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--border-2); position: absolute; left: -21px; top: 5px; }
    .tl-dot.red { background: var(--red); }
    .tl-date { font-size: 11px; color: var(--text-3); margin-bottom: 2px; }
    .tl-desc { font-size: 13px; color: var(--text); }

    .note { background: var(--amber-bg); border: 0.5px solid var(--amber-bdr); border-radius: var(--radius-md); padding: 12px 14px; font-size: 12px; color: var(--amber); margin-bottom: 1.25rem; line-height: 1.6; }
    .sources { font-size: 12px; color: var(--text-3); margin-bottom: 0.5rem; }
    .links { display: flex; gap: 10px; flex-wrap: wrap; }
    .links a { font-size: 12px; color: var(--blue); text-decoration: none; border: 0.5px solid var(--border); border-radius: var(--radius-md); padding: 5px 10px; }
    .links a:hover { background: var(--bg-2); text-decoration: underline; }
    footer { margin-top: 3rem; padding-top: 1.25rem; border-top: 0.5px solid var(--border); font-size: 11px; color: var(--text-3); }
    .loading { text-align: center; padding: 4rem 0; color: var(--text-3); font-size: 14px; }

    /* Optimized Word Cloud Layout */
    .word-cloud-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 10px 16px;
      padding: 20px 15px;
      background: var(--bg);
      border-radius: var(--radius-md);
      min-height: 160px;
      text-align: center;
    }
    .cloud-word {
      font-weight: 600;
      line-height: 1;
      display: inline-block;
      transition: transform 0.2s ease, filter 0.2s ease;
      cursor: default;
    }
    .cloud-word:hover {
      transform: scale(1.12);
      filter: brightness(1.2);
      opacity: 1 !important;
    }

    @media (max-width: 500px) { .header-title { font-size: 18px; } .metric-value { font-size: 22px; } }
  </style>
</head>
<body>
<main class="page">
  <div id="app"><div class="loading">Loading outbreak data…</div></div>
</main>

<script>
let chartInstance = null;
let currentMode = 'cumulative';
let chartTimeline = [];

// --- TIME-SERIES SYMPTOM SEARCH STORAGE LOGIC ---

    { term: "Unexplained Bleeding", volume: 12 }
  ],
  "2026-04-20": [
    { term: "Incubation Period", volume: 97 },
    { term: "Sudden High Fever", volume: 85 },
    { term: "How Ebola Spreads", volume: 81 },

    { term: "Fatigue", volume: 62 },

  ],
  "2026-03-30": [
    { term: "Ebola Symptoms", volume: 99 },
    { term: "Sudden High Fever", volume: 70 },
    { term: "Is Ebola airborne?", volume: 68 },
    { term: "Severe Headache", volume: 52 },
    { term: "Fatigue", volume: 44 },
    { term: "Vomiting", volume: 31 },
    { term: "Diarrhea", volume: 25 },
    { term: "Sore Throat", volume: 19 }
  ]
};

function updateWordCloud(selectedDate) {
  const cloudContainer = document.getElementById("symptom-word-cloud");
  if (!cloudContainer) return;

  const dataset = symptomsHistoryDatabase[selectedDate];
  if (!dataset || dataset.length === 0) {
    cloudContainer.innerHTML = `<p style="color:var(--text-3); font-size:13px;">No keyword database logs for this snapshot date.</p>`;
    return;
  }

  cloudContainer.innerHTML = "";
  const palette = ['#378ADD', '#E24B4A', '#BA7517', '#534AB7', '#A32D2D', '#185FA5'];
  
  const maxVol = Math.max(...dataset.map(v => v.volume));
  const minVol = Math.min(...dataset.map(v => v.volume));
  
  dataset.forEach((item, idx) => {
    const scalePct = maxVol === minVol ? 1 : (item.volume - minVol) / (maxVol - minVol);
    const computedFontSize = Math.round(12 + (scalePct * 22));
    
    const color = palette[idx % palette.length];
    const opacity = parseFloat((0.55 + (scalePct * 0.45)).toFixed(2));

    const wordSpan = document.createElement('span');
    wordSpan.className = 'cloud-word';
    wordSpan.style.fontSize = `${computedFontSize}px`;
    wordSpan.style.color = color;
    wordSpan.style.opacity = opacity;
    wordSpan.textContent = item.term;
    wordSpan.title = `Relative Search Weight Index: ${item.volume}`;
    
    cloudContainer.appendChild(wordSpan);
  });
}

function buildDailyData(timeline) {
  return timeline.map((pt, i) => ({
    date:   pt.date,
    cases:  i === 0 ? pt.cases  : Math.max(0, pt.cases  - timeline[i-1].cases),
    deaths: i === 0 ? pt.deaths : Math.max(0, pt.deaths - timeline[i-1].deaths),
  }));
}

function switchMode(mode) {
  currentMode = mode;
  document.getElementById('btn-cumulative').classList.toggle('active', mode === 'cumulative');
  document.getElementById('btn-daily').classList.toggle('active', mode === 'daily');
  renderChart(mode);
}

function renderChart(mode) {
  const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const source = mode === 'cumulative' ? chartTimeline : buildDailyData(chartTimeline);

  const config = {
    type: mode === 'daily' ? 'bar' : 'line',
    data: {
      labels: source.map(d => d.date),
      datasets: [
        {
          label: mode === 'cumulative' ? 'Suspected cases' : 'New cases',
          data: source.map(d => d.cases),
          borderColor: '#378ADD',
          backgroundColor: mode === 'daily' ? 'rgba(55,138,221,0.7)' : (isDark ? 'rgba(55,138,221,0.12)' : 'rgba(55,138,221,0.08)'),
          fill: mode !== 'daily',
          tension: 0.35,
          pointRadius: mode === 'daily' ? 0 : 5,
          pointBackgroundColor: '#378ADD',
          pointBorderColor: isDark ? '#1c1c1a' : '#fff',
          pointBorderWidth: 2,
          borderWidth: 2,
          borderRadius: mode === 'daily' ? 4 : 0,
          order: 1,
        },
        {
          label: mode === 'cumulative' ? 'Suspected deaths' : 'New deaths',
          data: source.map(d => d.deaths),
          borderColor: '#E24B4A',
          backgroundColor: mode === 'daily' ? 'rgba(226,75,74,0.75)' : (isDark ? 'rgba(226,75,74,0.10)' : 'rgba(226,75,74,0.06)'),
          fill: mode !== 'daily',
          tension: 0.35,
          pointRadius: mode === 'daily' ? 0 : 5,
          pointBackgroundColor: '#E24B4A',
          pointBorderColor: isDark ? '#1c1c1a' : '#fff',
          pointBorderWidth: 2,
          borderWidth: 2,
          borderDash: mode === 'daily' ? [] : [5, 3],
          borderRadius: mode === 'daily' ? 4 : 0,
          order: 2,
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y.toLocaleString()}`,
            footer: items => {
              const c = items[0]?.parsed.y, d = items[1]?.parsed.y;
              if (c && d && mode === 'cumulative') return `CFR: ${Math.round((d/c)*100)}%`;
            }
          }
        }
      }
    }
  };

  if (chartInstance) {
    chartInstance.destroy();
    chartInstance = null;
  }
  chartInstance = new Chart(document.getElementById('mainChart'), config);
}

function renderGoogleTrends(data) {
  const trendsData = data.google_trends_surveillance;
  if (!trendsData) return;

  updateWordCloud("2026-05-24");

  // --- RENDER RISING QUERIES LIST ---
  const queriesContainer = document.getElementById("rising-queries-list");
  if (queriesContainer) {
    queriesContainer.innerHTML = "";
    if (trendsData.rising_searches && trendsData.rising_searches.length > 0) {
      let block = `<ul style="margin: 0; padding-left: 20px; list-style-type: square; color: #555; line-height: 1.8;">`;
      trendsData.rising_searches.forEach(q => {
        const displayVal = q.breakout_value === "Breakout" ? "🔥 Breakout" : `+${q.breakout_value}%`;
        block += `<li style="margin-bottom: 6px; font-size: 13px; color: var(--text);">"${q.query}" <span style="color: #BA7517; font-size: 11px; font-weight: bold;">(${displayVal})</span></li>`;
      });
      block += `</ul>`;
      queriesContainer.innerHTML = block;
    } else {
      queriesContainer.innerHTML = `<p style="color:#777; font-size:12px; margin:0;">No anomalous search surges detected.</p>`;
    }
  }

  // --- RENDER CATEGORY EVOLUTION LINE CHART ---
  const trendsCanvas = document.getElementById('trendsChart');
  if (!trendsCanvas) return;
  
  const timeLabels = trendsData.search_timeline.Ebola.map(item => item.time.split(" ")[0]);
  
  const datasets = [
    {
      label: 'General Ebola Searches',
      data: trendsData.search_timeline.Ebola.map(item => item.score),
      borderColor: '#E24B4A',
      backgroundColor: 'transparent',
      borderWidth: 2,
      tension: 0.35,
      pointRadius: 0
    },
    {
      label: 'Transmission Queries',
      data: trendsData.search_timeline.Transmission.map(item => item.score),
      borderColor: '#BA7517',
      backgroundColor: 'transparent',
      borderWidth: 1.5,
      borderDash: [4, 4],
      tension: 0.35,
      pointRadius: 0
    }
  ];

  new Chart(trendsCanvas.getContext('2d'), {
    type: 'line',
    data: { labels: timeLabels, datasets: datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { 
        legend: { 
          display: true,
          position: 'top',
          labels: { color: 'var(--text-2)', font: { size: 11 }, boxWidth: 12 } 
        } 
      },
      scales: {
        x: { ticks: { color: 'var(--text-3)', maxTicksLimit: 12 }, grid: { display: false } },
        y: { min: 0, max: 100, ticks: { color: 'var(--text-3)' }, grid: { color: 'var(--border)' } }
      }
    }
  });
}

    <hr class="section-divider">

      <div class="chart-introduction" style="margin-bottom: 16px;">
        <p class="section-title" style="margin: 0 0 6px 0;">Reported Outbreak Timeline</p>
        <p style="font-size: 13px; color: #555; margin: 0; line-height: 1.5; max-width: 850px;">
          This timeline tracks the reporting history of the outbreak based on official CDC Situation Summaries as they are published live. Periodic adjustments reflect official corrections and the removal of discarded false positives at the source.
        </p>
      </div>

    <p class="section-title">Affected provinces &amp; health zones (DRC)</p>
    <table>
      <thead><tr><th>Location</th><th>Health areas affected</th><th>Status</th></tr></thead>
      <tbody>
        ${healthZones.map(z => `<tr><td>${z.name}</td><td>${z.areasAffected ?? '—'}</td><td>${z.status}</td></tr>`).join('')}
      </tbody>
    </table>

    <hr class="section-divider">

    <p class="section-title">Key events</p>
    <div class="timeline">
      ${events.map(e => `
        <div class="tl-item">
          <div class="tl-dot ${e.red ? 'red' : ''}"></div>
          <p class="tl-date">${e.date}</p>
          <p class="tl-desc">${e.desc}</p>
        </div>
      `).join('')}
    </div>

    <p class="note">
      <strong>Data caveat:</strong> All figures are suspected/reported totals from WHO and CDC.
    </p>

    <p class="sources">Sources &amp; further reading:</p>
    <div class="links">
      <a href="https://www.who.int/emergencies/disease-outbreak-news/item/2026-DON602" target="_blank" rel="noopener">WHO Disease Outbreak News ↗</a>
      <a href="https://www.cdc.gov/ebola/situation-summary/index.html" target="_blank" rel="noopener">CDC Situation Summary ↗</a>
      <a href="https://www.cdc.gov/han/php/notices/han00530.html" target="_blank" rel="noopener">CDC Health Alert Network ↗</a>
      <a href="https://www.who.int/news/item/17-05-2026-epidemic-of-ebola-disease-in-the-democratic-republic-of-the-congo-and-uganda-determined-a-public-health-emergency-of-international-concern" target="_blank" rel="noopener">WHO PHEIC Declaration ↗</a>
    </div>
    
    <footer>
      Last updated ${updated} · Not a medical resource.
      <div style="margin-top: 8px;">
        <img src="https://visitor-badge.laobi.icu/badge?page_id=mm33na.ebola-outbreak&left_text=views" alt="Views"/>
      </div>
    </footer>
  `;

  renderChart('cumulative');
  buildNetwork(data.network, isDark, divColor);
  renderGoogleTrends(data);
}

function buildNetwork(network, isDark, divColor) {
  const C = {
    origin:  { fill: isDark?'#501313':'#FCEBEB', stroke: isDark?'#791F1F':'#F7C1C1', title: isDark?'#F09595':'#791F1F', text: isDark?'#F09595':'#A32D2D', line: isDark?'#791F1F':'#F7C1C1' },
    hub:     { fill: isDark?'#4A1B0C':'#FAECE7', stroke: isDark?'#993C1D':'#F0997B', title: isDark?'#F5C4B3':'#4A1B0C', text: isDark?'#F0997B':'#993C1D', line: isDark?'#993C1D':'#F0997B' },
    export:  { fill: isDark?'#412402':'#FAEEDA', stroke: isDark?'#854F0B':'#FAC775', title: isDark?'#FAC775':'#412402', text: isDark?'#EF9F27':'#854F0B', line: isDark?'#854F0B':'#FAC775' },
    contact: { fill: isDark?'#042C53':'#E6F1FB', stroke: isDark?'#185FA5':'#B5D4F4', title: isDark?'#B5D4F4':'#042C53', text: isDark?'#85B7EB':'#185FA5', line: isDark?'#185FA5':'#B5D4F4' },
    alert:   { fill: isDark?'#26215C':'#EEEDFE', stroke: isDark?'#534AB7':'#CECBF6', title: isDark?'#CECBF6':'#26215C', text: isDark?'#AFA9EC':'#534AB7', line: isDark?'#534AB7':'#CECBF6' },
    suspect: { fill: isDark?'#2C1A04':'#FFF4E6', stroke: isDark?'#8A4E0A':'#FFBB70', title: isDark?'#FFBB70':'#5A2D00', text: isDark?'#FFA040':'#8A4E0A', line: isDark?'#8A4E0A':'#FFBB70' },
  };
  const LC = { confirmed:'#A32D2D', contact:'#185FA5', alert:'#534AB7', suspect:'#E67E22' };
  const tCol = isDark?'#888780':'#88877f';

  const nodeMap = {};
  network.nodes.forEach(n => nodeMap[n.id] = n);

  const rightNodes = network.nodes.filter(n => n.type === 'export' || n.type === 'contact' || n.type === 'alert' || n.type === 'suspect');
  const rightY = (i) => 80 + i * (280 / Math.max(rightNodes.length - 1, 1));
  rightNodes.forEach((n, i) => { n._x = 530; n._y = rightY(i); });

  const leftNodes = network.nodes.filter(n => n.type === 'origin');
  leftNodes.forEach((n, i) => { n._x = 20; n._y = 120 + i * 170; });

  const hubNode = network.nodes.find(n => n.type === 'hub');
  if (hubNode) { hubNode._x = 263; hubNode._y = 185; }

  const svg = document.getElementById('graph-svg');

  const tooltip = document.createElement('div');
  Object.assign(tooltip.style, {
    position:'fixed', pointerEvents:'none', background: isDark?'#252523':'#fff',
    border:`0.5px solid ${isDark?'rgba(255,255,255,0.16)':'rgba(0,0,0,0.18)'}`,
    borderRadius:'8px', padding:'10px 13px', fontSize:'12px',
    color: isDark?'#f0efea':'#1a1a18', maxWidth:'240px',
    boxShadow:'0 4px 16px rgba(0,0,0,0.12)', opacity:'0',
    transition:'opacity 0.15s', zIndex:'100', lineHeight:'1.55'
  });
  document.body.appendChild(tooltip);

  function svgEl(tag) { return document.createElementNS('http://www.w3.org/2000/svg', tag); }
  function rect(x, y, w, h, rx, fill, stroke, sw) {
    const el = svgEl('rect'); el.setAttribute('x', x); el.setAttribute('y', y); el.setAttribute('width', w); el.setAttribute('height', h); el.setAttribute('rx', rx); el.setAttribute('fill', fill); el.setAttribute('stroke', stroke); el.setAttribute('stroke-width', sw); svg.appendChild(el);
  }
  function text(x, y, content, size, weight, fill, anchor) {
    const el = svgEl('text'); el.setAttribute('x', x); el.setAttribute('y', y); el.setAttribute('font-size', size); el.setAttribute('font-weight', weight); el.setAttribute('fill', fill); el.setAttribute('text-anchor', anchor||'start'); el.setAttribute('dominant-baseline', 'central'); el.setAttribute('pointer-events', 'none'); el.textContent = content; svg.appendChild(el);
  }
  function line(x1, y1, x2, y2, stroke, sw) {
    const el = svgEl('line'); el.setAttribute('x1',x1); el.setAttribute('y1',y1); el.setAttribute('x2',x2); el.setAttribute('y2',y2); el.setAttribute('stroke',stroke); el.setAttribute('stroke-width',sw); svg.appendChild(el);
  }
  function arrow(id, color) {
    const defs = svg.querySelector('defs') || (() => { const d=svgEl('defs'); svg.appendChild(d); return d; })();
    const m = svgEl('marker'); m.setAttribute('id', id); m.setAttribute('viewBox','0 0 10 10'); m.setAttribute('refX','8'); m.setAttribute('refY','5'); m.setAttribute('markerWidth','6'); m.setAttribute('markerHeight','6'); m.setAttribute('orient','auto-start-reverse');
    const p = svgEl('path'); p.setAttribute('d','M2 1L8 5L2 9'); p.setAttribute('fill','none'); p.setAttribute('stroke',color); p.setAttribute('stroke-width','1.5'); p.setAttribute('stroke-linecap','round'); p.setAttribute('stroke-linejoin','round'); m.appendChild(p); defs.appendChild(m);
  }
  function arc(sx, sy, tx, ty, type) {
    const sw = 160, sh = 80;
    const x1 = sx+sw, y1 = sy+sh/2; const x2 = tx, y2 = ty+sh/2; const mx = (x1+x2)/2;
    const el = svgEl('path'); el.setAttribute('d', `M ${x1} ${y1} C ${mx} ${y1}, ${mx} ${y2}, ${x2} ${y2}`); el.setAttribute('fill','none'); el.setAttribute('stroke', LC[type]); el.setAttribute('stroke-width', type==='confirmed'?1.8:1.4);
    if (type==='contact') el.setAttribute('stroke-dasharray','6 4');
    if (type==='alert')   el.setAttribute('stroke-dasharray','2 5');
    if (type==='suspect') el.setAttribute('stroke-dasharray','4 3');
    el.setAttribute('marker-end',`url(#arr-${type})`); svg.appendChild(el);
  }

  const bg = svgEl('rect'); bg.setAttribute('width','680'); bg.setAttribute('height','500'); bg.setAttribute('fill', isDark?'#252523':'#f5f5f3'); bg.setAttribute('rx','12');
  svg.innerHTML = ''; svg.appendChild(bg);

  arrow('arr-confirmed', LC.confirmed); arrow('arr-contact', LC.contact); arrow('arr-alert', LC.alert); arrow('arr-suspect', LC.suspect);

  text(96,  22, 'DRC origin zones',      11, 400, tCol, 'middle');
  text(343, 22, 'Epicentre hub',          11, 400, tCol, 'middle');
  text(610, 22, 'International spread',   11, 400, tCol, 'middle');

  line(220,18,220,490, divColor, 0.5);
  line(460,18,460,490, divColor, 0.5);

  network.links.forEach(l => {
    const s = nodeMap[l.source], t = nodeMap[l.target];
    if (s && t) arc(s._x, s._y, t._x, t._y, l.type);
  });

  network.nodes.forEach(n => {
    const c = C[n.type] || C.origin; const x = n._x, y = n._y; const w = 160, h = 80; const cx = x + w/2;
    rect(x, y, w, h, 8, c.fill, c.stroke, n.type==='hub' ? 0.8 : 0.5);
    text(cx, y+22, n.label, 12, 500, c.title, 'middle');
    text(cx, y+38, n.country, 11, 400, c.text, 'middle');
    line(x, y+50, x+w, y+50, c.line, 0.5);
    if (n.cases === -1) {
      text(cx, y+65, 'Part of DRC total', 10, 400, c.text, 'middle');
    } else {
      text(cx - 30, y+65, `${n.cases > 0 ? n.cases.toLocaleString() : '0'} cases`, 11, 400, c.text, 'middle');
      text(cx + 38, y+65, `${n.deaths > 0 ? n.deaths : '0'} deaths`, 11, 400, c.text, 'middle');
    }

    const r = svgEl('rect'); r.setAttribute('x', x); r.setAttribute('y', y); r.setAttribute('width', w); r.setAttribute('height', h); r.setAttribute('rx', 8); r.setAttribute('fill', 'transparent'); r.style.cursor = 'default';
    r.addEventListener('mouseenter', e => {
      tooltip.innerHTML = `<strong style="font-size:13px">${n.label}</strong><br><span style="font-size:11px;opacity:0.6">${n.country}</span><br><span style="opacity:0.8">${n.detail}</span>`; tooltip.style.opacity = '1';
    });
    r.addEventListener('mousemove', e => { tooltip.style.left = (e.clientX+14)+'px'; tooltip.style.top = (e.clientY-10)+'px'; });
    r.addEventListener('mouseleave', () => tooltip.style.opacity='0'); svg.appendChild(r);
  });
}

async function init() {
  try {
    console.log("Fetching data.json payload...");
    const response = await fetch('data.json');
    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
    
    const data = await response.json();
    console.log("Data loaded successfully:", data);

    if (data.timeline) {
      chartTimeline = data.timeline;
    }

    // Recalculate the CFR correctly using confirmed data before rendering the summary
    if (data.summary) {
      data.summary.cfrPercent = Math.round(((data.summary.confirmedDeaths + (data.summary.ugandaDeaths || 0)) / data.summary.confirmedDRC) * 100);
    }

    renderSummary(data);

  } catch (error) {
    console.error("Dashboard failed to initialize:", error);
    const appDiv = document.getElementById('app') || document.body;
    appDiv.innerHTML = `<div style="padding: 20px; color: #E24B4A; font-family: sans-serif;">
      <h3 style="margin-top:0;">Dashboard Initialization Failed</h3>
      <p style="font-size:13px; color:#555;">${error.message}</p>
      <p style="font-size:12px; color:#999;">Check your browser console (F12) for details.</p>
    </div>`;
  }
}

window.addEventListener('DOMContentLoaded', init);
</script>
