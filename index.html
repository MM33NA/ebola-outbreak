<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2026 Ebola Outbreak Dashboard — DRC & Uganda</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff; --bg-2: #f5f5f3; --text: #1a1a18; --text-2: #5f5e5a;
      --text-3: #88877f; --border: rgba(0,0,0,0.10); --border-2: rgba(0,0,0,0.18);
      --blue: #378ADD; --red: #E24B4A; --amber: #BA7517;
      --amber-bg: #faeeda; --amber-bdr: #FAC775; --radius-md: 8px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1a; --bg-2: #252523; --text: #f0efea; --text-2: #b4b2a9;
        --text-3: #888780; --border: rgba(255,255,255,0.09); --border-2: rgba(255,255,255,0.16);
        --amber-bg: #412402; --amber-bdr: #854F0B;
      }
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 15px; line-height: 1.6; background: var(--bg); color: var(--text); min-height: 100vh; }
    .page { max-width: 900px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }
    .header { margin-bottom: 1.75rem; }
    .header-eyebrow { font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-3); margin-bottom: 4px; }
    .header-title { font-size: 22px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    .header-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .badge { font-size: 11px; color: var(--text-3); background: var(--bg-2); border: 0.5px solid var(--border); border-radius: var(--radius-md); padding: 3px 9px; }
    .badge-red { color: #A32D2D; background: #FCEBEB; border-color: #F7C1C1; }
    @media (prefers-color-scheme: dark) { .badge-red { color: #F09595; background: #501313; border-color: #791F1F; } }
    .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 5px; margin-bottom: 1.75rem; }
    .metric { background: var(--bg-2); border-radius: var(--radius-md); padding: 1rem; }
    .metric-label { font-size: 12px; color: var(--text-2); margin-bottom: 4px; }
    .metric-value { font-size: 26px; font-weight: 600; color: var(--text); }
    .metric-value.red { color: var(--red); }
    .metric-value.amber { color: var(--amber); }
    .metric-sub { font-size: 11px; color: var(--text-3); margin-top: 3px; }
    .section-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 0.75rem; }
    .section-sub { font-size: 13px; color: var(--text-2); margin-bottom: 1rem; line-height: 1.6; }
    .section-divider { border: none; border-top: 0.5px solid var(--border); margin: 2rem 0; }

    .chart-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
    .toggle-group { display: flex; background: var(--bg-2); border: 0.5px solid var(--border); border-radius: var(--radius-md); overflow: hidden; }
    .toggle-btn { font-size: 12px; padding: 5px 12px; border: none; background: transparent; color: var(--text-2); cursor: pointer; transition: background 0.15s, color 0.15s; }
    .toggle-btn.active { background: var(--blue); color: #fff; }

    .legend { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 10px; font-size: 12px; color: var(--text-2); }
    .legend-item { display: flex; align-items: center; gap: 5px; }
    .legend-swatch { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }
    .chart-wrap { position: relative; width: 100%; height: 300px; margin-bottom: 1.75rem; }

    .graph-card { background: var(--bg-2); border-radius: 12px; overflow: hidden; margin-bottom: 1.5rem; }
    #graph-svg { width: 100%; display: block; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 1.75rem; }
    th { text-align: left; font-size: 11px; font-weight: 500; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.05em; padding: 6px 10px; border-bottom: 0.5px solid var(--border); }
    td { padding: 7px 8px; color: var(--text); border-bottom: 0.5px solid var(--border); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--bg-2); }

    .timeline { border-left: 2px solid var(--border-2); margin-left: 8px; padding-left: 16px; display: flex; flex-direction: column; gap: 16px; margin-bottom: 1.75rem; }
    .tl-item { position: relative; }
    .tl-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--border-2); position: absolute; left: -21px; top: 5px; }
    .tl-dot.red { background: var(--red); }
    .tl-date { font-size: 11px; color: var(--text-3); margin-bottom: 2px; }
    .tl-desc { font-size: 13px; color: var(--text); }

    .note { background: var(--amber-bg); border: 0.5px solid var(--amber-bdr); border-radius: var(--radius-md); padding: 12px 14px; font-size: 12px; color: var(--amber); margin-bottom: 1.25rem; line-height: 1.6; }
    .sources { font-size: 12px; color: var(--text-3); margin-bottom: 0.5rem; }
    .links { display: flex; gap: 10px; flex-wrap: wrap; }
    .links a { font-size: 12px; color: var(--blue); text-decoration: none; border: 0.5px solid var(--border); border-radius: var(--radius-md); padding: 5px 10px; }
    .links a:hover { background: var(--bg-2); text-decoration: underline; }
    footer { margin-top: 3rem; padding-top: 1.25rem; border-top: 0.5px solid var(--border); font-size: 11px; color: var(--text-3); }
    .loading { text-align: center; padding: 4rem 0; color: var(--text-3); font-size: 14px; }

    .word-cloud-container {
      position: relative;
      width: 100%;
      min-height: 320px;
      background: var(--bg);
      border-radius: var(--radius-md);
      overflow: hidden;
      margin-top: 10px;
    }
    .word-cloud-control-panel {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    #periodSelect {
      padding: 4px 8px;
      font-size: 12px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
    }
    .cloud-word {
      position: absolute;
      font-weight: bold;
      line-height: 0.9;
      white-space: nowrap;
      transform-origin: center center;
      transition: transform 0.2s ease, filter 0.2s ease;
      cursor: default;
      user-select: none;
    }
    .cloud-word:hover {
      transform: translate(-50%, -50%) scale(1.1) !important;
      filter: brightness(1.2);
      z-index: 100;
    }

    @media (max-width: 500px) { .header-title { font-size: 18px; } .metric-value { font-size: 22px; } }
  </style>
</head>
<body>
<main class="page">
  <div id="app"><div class="loading">Loading outbreak data…</div></div>
</main>

<script>
// ─── Module-level state ───────────────────────────────────────────────────────
let chartInstance  = null;
let currentMode    = 'cumulative';
let chartTimeline  = [];   // FIX: populated from data.timeline before renderChart()

// ─── Word cloud ───────────────────────────────────────────────────────────────
function updateWordCloudView(selectedDate) {
  const cloudContainer = document.getElementById('symptom-word-cloud');
  if (!cloudContainer) return;

  if (!window.ebolaData || !window.ebolaData.google_trends || !window.ebolaData.google_trends.word_cloud) {
    cloudContainer.innerHTML = `<p style="color:var(--text-3);font-size:13px;padding:20px;text-align:center;">
      No word-cloud data available. Run trends.py to populate search logs.
    </p>`;
    return;
  }

  const targetCloud = window.ebolaData.google_trends.word_cloud;
  let rawWordsObject = {};

  if (selectedDate === 'all') {
    rawWordsObject = targetCloud.all_time || {};
  } else {
    rawWordsObject = (targetCloud.periods && targetCloud.periods[selectedDate]) || {};
  }

  if (!rawWordsObject || Object.keys(rawWordsObject).length === 0) {
    cloudContainer.innerHTML = `<p style="color:var(--text-3);font-size:13px;padding:20px;text-align:center;">No keyword data for this period.</p>`;
    return;
  }

  cloudContainer.innerHTML = '';

  const colors = [
    '#1f77b4','#aec7e8','#ff7f0e','#ffbb78','#2ca02c',
    '#98df8a','#d62728','#ff9896','#9467bd','#c5b0d5',
    '#8c564b','#e377c2','#f7b6d2','#bcbd22','#17becf'
  ];

  const dataset = Object.entries(rawWordsObject).map(([word, frequency]) => ({ term: word, volume: frequency }));
  const maxVol  = Math.max(...dataset.map(v => v.volume));
  const minVol  = Math.min(...dataset.map(v => v.volume));

  const width   = cloudContainer.offsetWidth || 600;
  const height  = 320;
  const centerX = width  / 2;
  const centerY = height / 2;
  const placed  = [];

  function intersects(x1, y1, w1, h1) {
    for (const ex of placed) {
      if (x1 < ex.x2 && x1 + w1 > ex.x1 && y1 < ex.y2 && y1 + h1 > ex.y1) return true;
    }
    return false;
  }

  [...dataset].sort((a, b) => b.volume - a.volume).forEach((item, idx) => {
    const scalePct = maxVol === minVol ? 0.5 : (item.volume - minVol) / (maxVol - minVol);
    const fontSize = Math.round(12 + scalePct * 28);

    const span = document.createElement('span');
    span.className   = 'cloud-word';
    span.style.fontSize = `${fontSize}px`;
    span.style.color    = colors[idx % colors.length];
    span.textContent    = item.term;
    span.title          = `Relative Search Weight Index: ${item.volume}`;
    cloudContainer.appendChild(span);

    const ww = span.offsetWidth;
    const wh = span.offsetHeight;

    let angle = 0, radius = 0, posX = 0, posY = 0, ok = false;
    while (!ok && radius < Math.max(width, height)) {
      posX = centerX + radius * Math.cos(angle) - ww / 2;
      posY = centerY + radius * Math.sin(angle) - wh / 2;
      if (posX > -50 && posX + ww < width + 50 && posY > -50 && posY + wh < height + 50) {
        if (!intersects(posX, posY, ww, wh)) {
          placed.push({ x1: posX, y1: posY, x2: posX + ww, y2: posY + wh });
          ok = true;
        }
      }
      angle  += 0.15;
      radius += 0.2;
    }

    if (ok) {
      span.style.left      = `${posX + ww / 2}px`;
      span.style.top       = `${posY + wh / 2}px`;
      span.style.transform = 'translate(-50%, -50%)';
    } else {
      span.remove();
    }
  });
}

// ─── Chart helpers ────────────────────────────────────────────────────────────
function buildDailyData(timeline) {
  return timeline.map((pt, i) => ({
    date:   pt.date,
    cases:  i === 0 ? pt.cases  : Math.max(0, pt.cases  - timeline[i - 1].cases),
    deaths: i === 0 ? pt.deaths : Math.max(0, pt.deaths - timeline[i - 1].deaths),
  }));
}

function switchMode(mode) {
  currentMode = mode;
  document.getElementById('btn-cumulative').classList.toggle('active', mode === 'cumulative');
  document.getElementById('btn-daily').classList.toggle('active', mode === 'daily');
  renderChart(mode);
}

function renderChart(mode) {
  // FIX: guard — nothing to draw without data
  if (!chartTimeline || chartTimeline.length === 0) {
    console.warn('renderChart called before chartTimeline was populated.');
    return;
  }

  const canvas = document.getElementById('mainChart');
  if (!canvas) { console.warn('mainChart canvas not found.'); return; }

  const isDark  = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const source  = mode === 'cumulative' ? chartTimeline : buildDailyData(chartTimeline);
  const display = mode === 'daily' ? source.slice(1) : source;


  const config = {
    type: mode === 'daily' ? 'bar' : 'line',
    data: {
      labels: display.map(d => d.date),
      datasets: [
        {
          label: mode === 'cumulative' ? 'Confirmed cases' : 'New confirmed cases',
          data: display.map(d => d.cases),
          borderColor: '#378ADD',
          backgroundColor: mode === 'daily' ? 'rgba(55,138,221,0.7)' : (isDark ? 'rgba(55,138,221,0.12)' : 'rgba(55,138,221,0.08)'),
          fill: mode !== 'daily',
          tension: 0.35,
          pointRadius: mode === 'daily' ? 0 : 5,
          pointBackgroundColor: '#378ADD',
          pointBorderColor: isDark ? '#1c1c1a' : '#fff',
          pointBorderWidth: 2,
          borderWidth: 2,
          borderRadius: mode === 'daily' ? 4 : 0,
          order: 1,
        },
        {
          label: mode === 'cumulative' ? 'Confirmed deaths' : 'New confirmed deaths',
          data: display.map(d => d.deaths),
          borderColor: '#E24B4A',
          backgroundColor: mode === 'daily' ? 'rgba(226,75,74,0.75)' : (isDark ? 'rgba(226,75,74,0.10)' : 'rgba(226,75,74,0.06)'),
          fill: mode !== 'daily',
          tension: 0.35,
          pointRadius: mode === 'daily' ? 0 : 5,
          pointBackgroundColor: '#E24B4A',
          pointBorderColor: isDark ? '#1c1c1a' : '#fff',
          pointBorderWidth: 2,
          borderWidth: 2,
          borderDash: mode === 'daily' ? [] : [5, 3],
          borderRadius: mode === 'daily' ? 4 : 0,
          order: 2,
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y.toLocaleString()}`,
            footer: items => {
              const c = items[0]?.parsed.y, d = items[1]?.parsed.y;
              if (c && d && mode === 'cumulative') return `CFR (Confirmed): ${Math.round((d / c) * 100)}%`;
            }
          }
        }
      },
      scales: {
        x: { ticks: { color: 'var(--text-3)', maxTicksLimit: 12 }, grid: { display: false } },
        y: { ticks: { color: 'var(--text-3)' }, grid: { color: 'var(--border)' } }
      }
    }
  };

  if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
  chartInstance = new Chart(canvas, config);
}

// ─── Google Trends section ────────────────────────────────────────────────────
function renderGoogleTrends(data) {
  // FIX: key unified — use google_trends_surveillance throughout, and alias
  // window.ebolaData.google_trends to the same object so the word cloud works.
  const trendsData = data.google_trends_surveillance;
  if (!trendsData) {
    console.warn('google_trends_surveillance payload missing.');
    return;
  }

  // FIX: expose under the key the word cloud helper expects
  if (!window.ebolaData.google_trends) {
    window.ebolaData.google_trends = trendsData;
  }

  updateWordCloudView('all');

  // Rising queries list
  const queriesContainer = document.getElementById('rising-queries-list');
  if (queriesContainer) {
    if (trendsData.rising_searches && trendsData.rising_searches.length > 0) {
      let block = `<ul style="margin:0;padding-left:20px;list-style-type:square;line-height:1.8;">`;
      trendsData.rising_searches.forEach(q => {
        const displayVal = q.breakout_value === 'Breakout' ? '🔥 Breakout' : `+${q.breakout_value}%`;
        block += `<li style="margin-bottom:6px;font-size:13px;color:var(--text);">"${q.query}" <span style="color:#BA7517;font-size:11px;font-weight:bold;">(${displayVal})</span></li>`;
      });
      block += '</ul>';
      queriesContainer.innerHTML = block;
    } else {
      queriesContainer.innerHTML = `<p style="color:#777;font-size:12px;margin:0;">No anomalous search surges detected.</p>`;
    }
  }

  // Search intensity line chart
  const trendsCanvas = document.getElementById('trendsChart');
  if (!trendsCanvas) { console.warn("Canvas 'trendsChart' not found."); return; }
  if (!trendsData.search_timeline?.Ebola) { console.warn('search_timeline.Ebola missing.'); return; }

  const timeLabels = trendsData.search_timeline.Ebola.map(item => item.time.split(' ')[0]);
  const datasets   = [
    {
      label: 'General Ebola Searches',
      data: trendsData.search_timeline.Ebola.map(item => item.score),
      borderColor: '#E24B4A', backgroundColor: 'transparent',
      borderWidth: 2, tension: 0.35, pointRadius: 0
    },
    {
      label: 'Transmission Queries',
      data: (trendsData.search_timeline.Transmission || []).map(item => item.score),
      borderColor: '#BA7517', backgroundColor: 'transparent',
      borderWidth: 1.5, borderDash: [4, 4], tension: 0.35, pointRadius: 0
    }
  ];

  new Chart(trendsCanvas.getContext('2d'), {
    type: 'line',
    data: { labels: timeLabels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          display: true, position: 'top',
          labels: { color: 'var(--text-2)', font: { size: 11 }, boxWidth: 12 }
        }
      },
      scales: {
        x: { ticks: { color: 'var(--text-3)', maxTicksLimit: 12 }, grid: { display: false } },
        y: { min: 0, max: 100, ticks: { color: 'var(--text-3)' }, grid: { color: 'var(--border)' } }
      }
    }
  });
}

// ─── Main render ──────────────────────────────────────────────────────────────
// FIX: renderSummary now owns the full page-build AND all chart initialisation.
// Nothing executes at parse time — all code is called after data is loaded.
function renderSummary(data) {
  const { summary, healthZones, events, updated } = data;
  const isDark   = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const divColor = isDark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.08)';

  // FIX: populate chartTimeline from data before any chart call
  chartTimeline = Array.isArray(data.timeline) ? data.timeline : [];

  document.getElementById('app').innerHTML = `
    <div class="header">
      <p class="header-eyebrow">Public health emergency of international concern (PHEIC)</p>
      <h1 class="header-title">2026 Ebola Outbreak — DRC &amp; Uganda</h1>
      <div class="header-meta">
        <span class="badge badge-red">Bundibugyo virus · No vaccine or treatment</span>
        <span class="badge">Data: WHO / CDC · Updated ${updated}</span>
      </div>
    </div>

    <div class="metrics">
      <div class="metric"><p class="metric-label">Confirmed cases</p><p class="metric-value">${summary.confirmedDRC}</p><p class="metric-sub">DRC + Uganda</p></div>
      <div class="metric"><p class="metric-label">Confirmed deaths</p><p class="metric-value red">${summary.confirmedDeaths + (summary.ugandaDeaths || 0)}</p><p class="metric-sub">DRC + Uganda</p></div>
      <div class="metric"><p class="metric-label">Case fatality rate</p><p class="metric-value amber">~${summary.cfrPercent}%</p><p class="metric-sub">25–50% est. for Bundibugyo</p></div>
      <div class="metric"><p class="metric-label">Uganda cases</p><p class="metric-value">${summary.ugandaCases}</p><p class="metric-sub">${summary.ugandaDeaths} death · Kampala</p></div>
    </div>

    <!-- FIX: toggle buttons are now included in the rendered HTML -->
    <div class="chart-header" style="margin-bottom:10px;">
      <p class="section-title" style="margin:0;">Cases &amp; deaths over time</p>
      <div class="toggle-group">
        <button id="btn-cumulative" class="toggle-btn active" onclick="switchMode('cumulative')">Cumulative</button>
        <button id="btn-daily"      class="toggle-btn"        onclick="switchMode('daily')">Daily</button>
      </div>
    </div>
    <div class="legend">
      <span class="legend-item"><span class="legend-swatch" style="background:#378ADD;"></span>Cases</span>
      <span class="legend-item"><span class="legend-swatch" style="background:#E24B4A;"></span>Deaths</span>
    </div>
    <div class="chart-wrap"><canvas id="mainChart"></canvas></div>

    <section style="margin:30px 0;padding:20px;background:var(--bg-2);border-radius:var(--radius-md);border:1px solid var(--border);">
      <h3 style="color:var(--text);margin-bottom:4px;font-size:14px;font-weight:bold;">Public Intent &amp; Behavior Surveillance</h3>
      <p style="font-size:12px;color:var(--text-2);margin-bottom:15px;">Monitoring shifts in information-seeking behavior to isolate genuine symptom awareness from geographic media spikes.</p>

      <div style="display:flex;flex-direction:column;gap:20px;">
        <div style="background:var(--bg);padding:15px;border-radius:var(--radius-md);border:1px solid var(--border);">
          <div class="word-cloud-control-panel">
            <h4 style="font-size:13px;color:var(--text-2);font-weight:600;">Active Symptom Inquiry Profile</h4>
            <select id="periodSelect" onchange="updateWordCloudView(this.value)">
              <option value="all">All Periods (Combined View)</option>
              <option value="2026-05-24">Latest Peak Outbreak (May 24)</option>
              <option value="2026-05-15">Uganda Importation Alert (May 15)</option>
              <option value="2026-04-20">PHEIC Status Evaluation (Apr 20)</option>
              <option value="2026-03-30">Initial Remote Wave (Mar 30)</option>
            </select>
          </div>
          <div id="symptom-word-cloud" class="word-cloud-container"></div>
        </div>

        <div style="display:flex;flex-direction:column;gap:20px;width:100%;">
          <div style="background:var(--bg);padding:15px;border-radius:var(--radius-md);border:1px solid var(--border);width:100%;">
            <h4 style="font-size:13px;color:var(--text-2);margin-bottom:15px;font-weight:600;">Historical Search Intensity</h4>
            <div style="position:relative;height:240px;width:100%;">
              <canvas id="trendsChart"></canvas>
            </div>
          </div>
          <div style="background:var(--bg);padding:15px;border-radius:var(--radius-md);border:1px solid var(--border);width:100%;">
            <h4 style="font-size:13px;color:var(--text-2);margin-bottom:12px;font-weight:600;">Anomalous Surges (Ebola)</h4>
            <div id="rising-queries-list" style="font-size:13px;color:var(--text);"></div>
          </div>
        </div>
      </div>

      <p class="note" style="margin-top:1.75rem;margin-bottom:0;">
        <strong>Note:</strong> Percentage surges reflect change from a near-zero baseline. Because Ebola-related searches are extremely rare during non-outbreak periods, moderate absolute increases in query volume produce outsized percentage figures. Furthermore, the multilingual query mix indicates broad international public interest rather than a localized signal.
      </p>
    </section>

    <p class="section-title">Transmission &amp; importation network</p>
    <p class="section-sub">Confirmed transmission chains and contact movements from the epicentre in Ituri Province, DRC. Hover nodes for detail.</p>

    <div class="graph-card">
      <svg id="graph-svg" viewBox="0 0 680 500" preserveAspectRatio="xMidYMid meet"></svg>
    </div>

    <p class="note" style="margin-bottom:1.75rem;">
      <strong>Network note:</strong> Germany represents a contact transfer — 1 American healthcare worker and 6 high-risk contacts were medically evacuated for monitoring. The United States has no confirmed cases.
    </p>

    <hr class="section-divider">

    <p class="section-title">Affected provinces &amp; health zones (DRC)</p>
    <table>
      <thead><tr><th>Location</th><th>Health areas affected</th><th>Status</th></tr></thead>
      <tbody>
        ${healthZones.map(z => `<tr><td>${z.name}</td><td>${z.areasAffected ?? '—'}</td><td>${z.status}</td></tr>`).join('')}
      </tbody>
    </table>

    <hr class="section-divider">

    <p class="section-title">Key events</p>
    <div class="timeline">
      ${events.map(e => `
        <div class="tl-item">
          <div class="tl-dot ${e.red ? 'red' : ''}"></div>
          <p class="tl-date">${e.date}</p>
          <p class="tl-desc">${e.desc}</p>
        </div>
      `).join('')}
    </div>

    <p class="note">
      <strong>Data caveat:</strong> Case and death figures reflect confirmed totals as reported by CDC. Suspected case tracking was discontinued by CDC in [date].

    </p>

    <p class="sources">Sources &amp; further reading:</p>
    <div class="links">
      <a href="https://www.who.int/emergencies/disease-outbreak-news/item/2026-DON602" target="_blank" rel="noopener">WHO Disease Outbreak News ↗</a>
      <a href="https://www.cdc.gov/ebola/situation-summary/index.html" target="_blank" rel="noopener">CDC Situation Summary ↗</a>
      <a href="https://www.cdc.gov/han/php/notices/han00530.html" target="_blank" rel="noopener">CDC Health Alert Network ↗</a>
      <a href="https://www.who.int/news/item/17-05-2026-epidemic-of-ebola-disease-in-the-democratic-republic-of-the-congo-and-uganda-determined-a-public-health-emergency-of-international-concern" target="_blank" rel="noopener">WHO PHEIC Declaration ↗</a>
    </div>

    <footer>
      Last updated ${updated} · Not a medical resource.
      <div style="margin-top:8px;">
        <img src="https://visitor-badge.laobi.icu/badge?page_id=mm33na.ebola-outbreak&left_text=views" alt="Views"/>
      </div>
    </footer>
  `;

  // FIX: all chart/network calls come AFTER innerHTML is set, so DOM elements exist
  renderChart('cumulative');
  if (data.network) buildNetwork(data.network, isDark, divColor);
  renderGoogleTrends(data);
}

// ─── Network graph ────────────────────────────────────────────────────────────
function buildNetwork(network, isDark, divColor) {
  const svg = document.getElementById('graph-svg');
  if (!svg) { console.warn("'graph-svg' not found."); return; }
  if (!network?.nodes || !network?.links) { console.warn('Network data missing or malformed.'); return; }

  const C = {
    origin:  { fill: isDark?'#501313':'#FCEBEB', stroke: isDark?'#791F1F':'#F7C1C1', title: isDark?'#F09595':'#791F1F', text: isDark?'#F09595':'#A32D2D', line: isDark?'#791F1F':'#F7C1C1' },
    hub:     { fill: isDark?'#4A1B0C':'#FAECE7', stroke: isDark?'#993C1D':'#F0997B', title: isDark?'#F5C4B3':'#4A1B0C', text: isDark?'#F0997B':'#993C1D', line: isDark?'#993C1D':'#F0997B' },
    export:  { fill: isDark?'#412402':'#FAEEDA', stroke: isDark?'#854F0B':'#FAC775', title: isDark?'#FAC775':'#412402', text: isDark?'#EF9F27':'#854F0B', line: isDark?'#854F0B':'#FAC775' },
    contact: { fill: isDark?'#042C53':'#E6F1FB', stroke: isDark?'#185FA5':'#B5D4F4', title: isDark?'#B5D4F4':'#042C53', text: isDark?'#85B7EB':'#185FA5', line: isDark?'#185FA5':'#B5D4F4' },
    alert:   { fill: isDark?'#26215C':'#EEEDFE', stroke: isDark?'#534AB7':'#CECBF6', title: isDark?'#CECBF6':'#26215C', text: isDark?'#AFA9EC':'#534AB7', line: isDark?'#534AB7':'#CECBF6' },
    suspect: { fill: isDark?'#2C1A04':'#FFF4E6', stroke: isDark?'#8A4E0A':'#FFBB70', title: isDark?'#FFBB70':'#5A2D00', text: isDark?'#FFA040':'#8A4E0A', line: isDark?'#8A4E0A':'#FFBB70' },
  };
  const LC   = { confirmed:'#A32D2D', contact:'#185FA5', alert:'#534AB7', suspect:'#E67E22' };
  const tCol = isDark ? '#888780' : '#88877f';

  let tooltip = document.getElementById('network-tooltip');
  if (!tooltip) {
    tooltip = document.createElement('div');
    tooltip.id = 'network-tooltip';
    document.body.appendChild(tooltip);
  }
  Object.assign(tooltip.style, {
    position:'fixed', pointerEvents:'none', background: isDark?'#252523':'#fff',
    border:`0.5px solid ${isDark?'rgba(255,255,255,0.16)':'rgba(0,0,0,0.18)'}`,
    borderRadius:'8px', padding:'10px 13px', fontSize:'12px',
    color: isDark?'#f0efea':'#1a1a18', maxWidth:'240px',
    boxShadow:'0 4px 16px rgba(0,0,0,0.12)', opacity:'0',
    transition:'opacity 0.15s', zIndex:'100', lineHeight:'1.55'
  });

  const nodeMap = {};
  network.nodes.forEach(n => nodeMap[n.id] = n);

  const rightNodes = network.nodes.filter(n => ['export','contact','alert','suspect'].includes(n.type));
  rightNodes.forEach((n, i) => { n._x = 530; n._y = 80 + i * (280 / Math.max(rightNodes.length - 1, 1)); });

  network.nodes.filter(n => n.type === 'origin').forEach((n, i) => { n._x = 20; n._y = 120 + i * 170; });

  const hubNode = network.nodes.find(n => n.type === 'hub');
  if (hubNode) { hubNode._x = 263; hubNode._y = 185; }

  function svgEl(tag) { return document.createElementNS('http://www.w3.org/2000/svg', tag); }

  function text(x, y, content, size, weight, fill, anchor) {
    const el = svgEl('text');
    el.setAttribute('x', x); el.setAttribute('y', y); el.setAttribute('font-size', size);
    el.setAttribute('font-weight', weight); el.setAttribute('fill', fill);
    el.setAttribute('text-anchor', anchor || 'start');
    el.setAttribute('dominant-baseline', 'central');
    el.setAttribute('pointer-events', 'none');
    el.textContent = content;
    svg.appendChild(el);
  }
  function line(x1, y1, x2, y2, stroke, sw) {
    const el = svgEl('line');
    el.setAttribute('x1',x1); el.setAttribute('y1',y1); el.setAttribute('x2',x2); el.setAttribute('y2',y2);
    el.setAttribute('stroke',stroke); el.setAttribute('stroke-width',sw);
    svg.appendChild(el);
  }
  function arrow(id, color) {
    const defs = svg.querySelector('defs') || (() => { const d = svgEl('defs'); svg.appendChild(d); return d; })();
    const m = svgEl('marker');
    m.setAttribute('id', id); m.setAttribute('viewBox','0 0 10 10');
    m.setAttribute('refX','8'); m.setAttribute('refY','5');
    m.setAttribute('markerWidth','6'); m.setAttribute('markerHeight','6');
    m.setAttribute('orient','auto-start-reverse');
    const p = svgEl('path');
    p.setAttribute('d','M2 1L8 5L2 9'); p.setAttribute('fill','none');
    p.setAttribute('stroke',color); p.setAttribute('stroke-width','1.5');
    p.setAttribute('stroke-linecap','round'); p.setAttribute('stroke-linejoin','round');
    m.appendChild(p); defs.appendChild(m);
  }
  function arc(sx, sy, tx, ty, type) {
    const sw = 160, sh = 80;
    const x1 = sx + sw, y1 = sy + sh / 2;
    const x2 = tx,      y2 = ty + sh / 2;
    const mx = (x1 + x2) / 2;
    const el = svgEl('path');
    el.setAttribute('d', `M ${x1} ${y1} C ${mx} ${y1}, ${mx} ${y2}, ${x2} ${y2}`);
    el.setAttribute('fill','none');
    el.setAttribute('stroke', LC[type]);
    el.setAttribute('stroke-width', type === 'confirmed' ? 1.8 : 1.4);
    if (type === 'contact') el.setAttribute('stroke-dasharray','6 4');
    if (type === 'alert')   el.setAttribute('stroke-dasharray','2 5');
    if (type === 'suspect') el.setAttribute('stroke-dasharray','4 3');
    el.setAttribute('marker-end', `url(#arr-${type})`);
    svg.appendChild(el);
  }

  const bg = svgEl('rect');
  bg.setAttribute('width','680'); bg.setAttribute('height','500');
  bg.setAttribute('fill', isDark ? '#252523' : '#f5f5f3'); bg.setAttribute('rx','12');
  svg.innerHTML = '';
  svg.appendChild(bg);

  arrow('arr-confirmed', LC.confirmed);
  arrow('arr-contact',   LC.contact);
  arrow('arr-alert',     LC.alert);
  arrow('arr-suspect',   LC.suspect);

  text(96,  22, 'DRC origin zones',       11, 400, tCol, 'middle');
  text(343, 22, 'Epicentre hub',           11, 400, tCol, 'middle');
  text(610, 22, 'International networks',  11, 400, tCol, 'middle');
  line(20, 36, 660, 36, divColor, 1);

  network.links.forEach(l => {
    const s = nodeMap[l.source], t = nodeMap[l.target];
    if (s && t) arc(s._x, s._y, t._x, t._y, l.type);
  });

  network.nodes.forEach(n => {
    const conf = C[n.type];
    if (!conf) return;

    const el  = svgEl('g'); el.style.cursor = 'pointer';
    const sw  = 160, sh = 80;
    const rEl = svgEl('rect');
    rEl.setAttribute('x', n._x); rEl.setAttribute('y', n._y);
    rEl.setAttribute('width', sw); rEl.setAttribute('height', sh);
    rEl.setAttribute('rx','8'); rEl.setAttribute('fill', conf.fill);
    rEl.setAttribute('stroke', conf.stroke); rEl.setAttribute('stroke-width','1');
    el.appendChild(rEl);
    svg.appendChild(el);

    const midX = n._x + sw / 2;
    const midY = n._y + sh / 2;
    const labelY = n.subtitle ? midY - 10 : midY;

    const t1 = svgEl('text');
    t1.setAttribute('x', midX); t1.setAttribute('y', labelY);
    t1.setAttribute('font-size','13'); t1.setAttribute('font-weight','600');
    t1.setAttribute('fill', conf.title); t1.setAttribute('text-anchor','middle');
    t1.setAttribute('dominant-baseline','central');
    t1.textContent = n.label; el.appendChild(t1);

    if (n.subtitle) {
      const t2 = svgEl('text');
      t2.setAttribute('x', midX); t2.setAttribute('y', midY + 12);
      t2.setAttribute('font-size','11'); t2.setAttribute('font-weight','500');
      t2.setAttribute('fill', conf.text); t2.setAttribute('text-anchor','middle');
      t2.setAttribute('dominant-baseline','central');
      t2.textContent = n.subtitle; el.appendChild(t2);
    }

    el.addEventListener('mouseenter', () => {
      rEl.setAttribute('stroke-width','1.7');
      rEl.setAttribute('stroke', conf.text);
      tooltip.innerHTML = `<b style="color:${conf.text};font-size:13px;">${n.label}</b>
        <div style="margin-top:4px;font-size:11px;color:${isDark?'#b4b2a9':'#5f5e5a'};font-weight:500;text-transform:uppercase;letter-spacing:0.03em;">${n.type} node</div>
        <p style="margin-top:6px;border-top:0.5px solid ${isDark?'rgba(255,255,255,0.1)':'rgba(0,0,0,0.1)'};padding-top:6px;">${n.details || 'No network details logged.'}</p>`;
      tooltip.style.opacity = '1';
    });
    el.addEventListener('mousemove', e => {
      tooltip.style.left = `${e.clientX + 15}px`;
      tooltip.style.top  = `${e.clientY + 15}px`;
    });
    el.addEventListener('mouseleave', () => {
      rEl.setAttribute('stroke-width','1');
      rEl.setAttribute('stroke', conf.stroke);
      tooltip.style.opacity = '0';
    });
  });
}

// ─── Bootstrap ────────────────────────────────────────────────────────────────
async function initDashboard() {
  try {
    const response = await fetch('data.json');
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const data = await response.json();

    // Normalise alternate network key
    if (!data.network && data.google_trends_surveillance?.network_graph) {
      data.network = data.google_trends_surveillance.network_graph;
    }

    window.ebolaData = data;
    renderSummary(data);           // FIX: called directly — no setTimeout needed
  } catch (err) {
    console.error('Dashboard failed to initialise:', err);
    document.getElementById('app').innerHTML = `
      <div style="padding:20px;color:#E24B4A;font-family:sans-serif;">
        <h3>Dashboard failed to load</h3>
        <p style="font-size:13px;color:#555;">${err.message}</p>
        <p style="font-size:12px;color:#999;">Check the browser console (F12) for details.</p>
      </div>`;
  }
}

window.addEventListener('DOMContentLoaded', initDashboard);
</script>
