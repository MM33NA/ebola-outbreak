<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2026 Ebola Outbreak Dashboard — DRC & Uganda</title>
  <script src="chart.umd.min.js"></script>  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff; --bg-2: #f5f5f3; --text: #1a1a18; --text-2: #5f5e5a;
      --text-3: #88877f; --border: rgba(0,0,0,0.10); --border-2: rgba(0,0,0,0.18);
      --blue: #378ADD; --red: #E24B4A; --amber: #BA7517;
      --amber-bg: #faeeda; --amber-bdr: #FAC775; --radius-md: 8px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1a; --bg-2: #252523; --text: #f0efea; --text-2: #b4b2a9;
        --text-3: #888780; --border: rgba(255,255,255,0.09); --border-2: rgba(255,255,255,0.16);
        --amber-bg: #412402; --amber-bdr: #854F0B;
      }
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 15px; line-height: 1.6; background: var(--bg); color: var(--text); min-height: 100vh; }
    .page { max-width: 900px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }
    .header { margin-bottom: 1.75rem; }
    .header-eyebrow { font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-3); margin-bottom: 4px; }
    .header-title { font-size: 22px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    .header-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .badge { font-size: 11px; color: var(--text-3); background: var(--bg-2); border: 0.5px solid var(--border); border-radius: var(--radius-md); padding: 3px 9px; }
    .badge-red { color: #A32D2D; background: #FCEBEB; border-color: #F7C1C1; }
    @media (prefers-color-scheme: dark) { .badge-red { color: #F09595; background: #501313; border-color: #791F1F; } }
    .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 5px; margin-bottom: 1.75rem; }
    .metric { background: var(--bg-2); border-radius: var(--radius-md); padding: 1rem; }
    .metric-label { font-size: 12px; color: var(--text-2); margin-bottom: 4px; }
    .metric-value { font-size: 26px; font-weight: 600; color: var(--text); }
    .metric-value.red { color: var(--red); }
    .metric-value.amber { color: var(--amber); }
    .metric-sub { font-size: 11px; color: var(--text-3); margin-top: 3px; }
    .section-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 0.75rem; }
    .section-sub { font-size: 13px; color: var(--text-2); margin-bottom: 1rem; line-height: 1.6; }
    .section-divider { border: none; border-top: 0.5px solid var(--border); margin: 2rem 0; }

    .chart-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
    .toggle-group { display: flex; background: var(--bg-2); border: 0.5px solid var(--border); border-radius: var(--radius-md); overflow: hidden; }
    .toggle-btn { font-size: 12px; padding: 5px 12px; border: none; background: transparent; color: var(--text-2); cursor: pointer; transition: background 0.15s, color 0.15s; }
    .toggle-btn.active { background: var(--blue); color: #fff; }

    .legend { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 10px; font-size: 12px; color: var(--text-2); }
    .legend-item { display: flex; align-items: center; gap: 5px; }
    .legend-swatch { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }
    .chart-wrap { position: relative; width: 100%; height: 300px; margin-bottom: 1.75rem; }

    .graph-card { background: var(--bg-2); border-radius: 12px; overflow: hidden; margin-bottom: 1.5rem; }
    #graph-svg { width: 100%; display: block; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 1.75rem; }
    th { text-align: left; font-size: 11px; font-weight: 500; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.05em; padding: 6px 10px; border-bottom: 0.5px solid var(--border); }
    td { padding: 7px 8px; color: var(--text); border-bottom: 0.5px solid var(--border); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--bg-2); }

    .timeline { border-left: 2px solid var(--border-2); margin-left: 8px; padding-left: 16px; display: flex; flex-direction: column; gap: 16px; margin-bottom: 1.75rem; }
    .tl-item { position: relative; }
    .tl-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--border-2); position: absolute; left: -21px; top: 5px; }
    .tl-dot.red { background: var(--red); }
    .tl-date { font-size: 11px; color: var(--text-3); margin-bottom: 2px; }
    .tl-desc { font-size: 13px; color: var(--text); }

    .note { background: var(--amber-bg); border: 0.5px solid var(--amber-bdr); border-radius: var(--radius-md); padding: 12px 14px; font-size: 12px; color: var(--amber); margin-bottom: 1.25rem; line-height: 1.6; }
    .sources { font-size: 12px; color: var(--text-3); margin-bottom: 0.5rem; }
    .links { display: flex; gap: 10px; flex-wrap: wrap; }
    .links a { font-size: 12px; color: var(--blue); text-decoration: none; border: 0.5px solid var(--border); border-radius: var(--radius-md); padding: 5px 10px; }
    .links a:hover { background: var(--bg-2); text-decoration: underline; }
    footer { margin-top: 3rem; padding-top: 1.25rem; border-top: 0.5px solid var(--border); font-size: 11px; color: var(--text-3); }
    .loading { text-align: center; padding: 4rem 0; color: var(--text-3); font-size: 14px; }

    .word-cloud-container {
      position: relative;
      width: 100%;
      height: 320px;
      background: var(--bg);
      border-radius: var(--radius-md);
      overflow: hidden;
      margin-top: 10px;
    }
    .word-cloud-control-panel {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    #periodSelect {
      padding: 4px 8px;
      font-size: 12px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
    }
    .cloud-word {
      position: absolute;
      font-weight: bold;
      line-height: 0.9;
      white-space: nowrap;
      transform-origin: center center;
      transition: transform 0.2s ease, filter 0.2s ease;
      cursor: default;
      user-select: none;
    }
    .cloud-word:hover {
      transform: translate(-50%, -50%) scale(1.1) !important;
      filter: brightness(1.2);
      z-index: 100;
    }

    @media (max-width: 500px) { .header-title { font-size: 18px; } .metric-value { font-size: 22px; } }
  </style>
</head>
<body>
<main class="page">
  <div id="app"><div class="loading">Loading outbreak data…</div></div>
</main>

<script>
// ─── Module-level state ───────────────────────────────────────────────────────
let chartInstance  = null;
let currentMode    = 'cumulative';
let chartTimeline  = [];

// ─── APPLICATION INITIALIZATION ──────────────────────────────────────────────
async function initDashboard() {
  try {
    const response = await fetch('data.json');
    if (!response.ok) throw new Error("Could not find data.json framework file.");
    
    const data = await response.json();
    
    // Save reference globally for interactive elements
    window.ebolaData = data;
    
    // 1. Paint the HTML structure and summaries
    renderSummary(data);
    
    // 2. Render chart visualizations safely
    renderChart(currentMode);
    if (data.google_trends_surveillance) {
      renderGoogleTrends(data);
    }
    
    // 3. Populate default initial word cloud view
    populateWordCloudPeriodOptions(data);
    updateWordCloudView('all');
    
  } catch (error) {
    console.error("Dashboard launch failure:", error);
    document.getElementById('app').innerHTML = `
      <div class="loading" style="color:var(--red);">
        ❌ Failed to load dashboard: ${error.message}<br>
        <span style="font-size:12px;color:var(--text-2);">Make sure data.json exists and both scrapers have run!</span>
      </div>`;
  }
}

// ─── WORD CLOUD PERIOD DROPDOWN — built from real data, not hardcoded ────────
function populateWordCloudPeriodOptions(data) {
  const select = document.getElementById('word-cloud-period-select');
  const periods = data?.google_trends_surveillance?.word_cloud?.periods;
  if (!select || !periods) return;

  Object.keys(periods).sort().reverse().forEach(periodKey => {
    const opt = document.createElement('option');
    opt.value = periodKey;
    const dateObj = new Date(periodKey + 'T00:00:00');
    const label = isNaN(dateObj) ? periodKey
      : dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    opt.textContent = `Period starting ${label}`;
    select.appendChild(opt);
  });
}

// ─── EPIDEMIOLOGICAL DATA SUMMARY RENDER ─────────────────────────────────────
function renderSummary(data) {
  if (!data || !data.summary) {
    console.warn("⚠️ Cannot parse summary metrics — data structure node is missing.");
    return;
  }

  // Secure Key Mapping: Capture parameters regardless of Python naming conventions
  const summary = data.summary;
  const updated = data.updated || "Live Update Loop";
  const confirmedDRC = summary.confirmedDRC || summary.confirmed || 0;
  const confirmedDeaths = summary.confirmedDeaths || summary.confirmed_deaths || summary.deaths || 0;
  const ugandaCases = summary.ugandaCases || summary.uganda_cases || 0;
  const ugandaDeaths = summary.ugandaDeaths || summary.uganda_deaths || 0;
  const cfrPercent = summary.cfrPercent || summary.cfr || 0;

  // Capture timeline data tracking sequences securely
  chartTimeline = Array.isArray(data.timeline) ? data.timeline : [];
  chartTimeline = chartTimeline.map(item => {
    if (item.date && item.date.includes('-')) {
        const parts = item.date.split('-');
        const dateObj = new Date(parts[0], parts[1] - 1, parts[2]);  
        return {
            ...item,
            date: dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
        };
    }
    return item;
  });

  // Extract events safe block
  const outbreakEvents = Array.isArray(data.events) ? data.events : [];
  let eventsHTML = '';
  
  if (outbreakEvents.length > 0) {
    eventsHTML = `
      <div style="margin: 30px 0 15px 0;">
        <h3 style="color:var(--text);font-size:14px;font-weight:bold;margin-bottom:2px;">Outbreak Milestones &amp; Events</h3>
        <p style="font-size:12px;color:var(--text-2);margin-bottom:15px;">Key operational developments and official health notifications chronologically filed.</p>
        <div style="display:flex; flex-direction:column; gap:10px; padding-left:10px; border-left: 2px solid var(--border);">
          ${outbreakEvents.map(ev => `
            <div style="position:relative; padding-bottom:5px;">
              <span style="position:absolute; left:-15px; top:4px; width:8px; height:8px; border-radius:50%; background:var(--red);"></span>
              <strong style="font-size:12px; color:var(--text); display:inline-block; min-width:80px;">${ev.date}</strong>
              <span style="font-size:12px; color:var(--text-2);">${ev.title || ev.description}</span>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }

  // Inject Master HTML Layout Framework
  document.getElementById('app').innerHTML = `
    <div class="header">
      <p class="header-eyebrow">Public health emergency of international concern (PHEIC)</p>
      <h1 class="header-title">2026 Ebola Outbreak — DRC &amp; Uganda</h1>
      <div class="header-meta">
        <span class="badge badge-red">Bundibugyo virus · No vaccine or treatment</span>
        <span class="badge">Data: WHO / CDC · Updated ${updated}</span>
      </div>
    </div>

    <div class="metrics">
      <div class="metric"><p class="metric-label">Confirmed cases</p><p class="metric-value">${confirmedDRC.toLocaleString()}</p><p class="metric-sub">DRC + Uganda</p></div>
      <div class="metric"><p class="metric-label">Confirmed deaths</p><p class="metric-value red">${(confirmedDeaths + ugandaDeaths).toLocaleString()}</p><p class="metric-sub">DRC + Uganda</p></div>
      <div class="metric"><p class="metric-label">Case fatality rate</p><p class="metric-value amber">~${cfrPercent}%</p><p class="metric-sub">25–50% est. for Bundibugyo</p></div>
      <div class="metric"><p class="metric-label">Uganda cases</p><p class="metric-value">${ugandaCases}</p><p class="metric-sub">${ugandaDeaths} death · Kampala</p></div>
    </div>

    <div class="chart-header" style="margin-bottom:10px;">
      <p class="section-title" style="margin:0;">Cases &amp; deaths over time</p>
      <div class="toggle-group">
        <button id="btn-cumulative" class="toggle-btn active" onclick="switchMode('cumulative')">Cumulative</button>
        <button id="btn-daily"      class="toggle-btn"        onclick="switchMode('daily')">Daily</button>
      </div>
    </div>
    <div class="legend">
      <span class="legend-item"><span class="legend-swatch" style="background:#378ADD;"></span>Cases</span>
      <span class="legend-item"><span class="legend-swatch" style="background:#E24B4A;"></span>Deaths</span>
    </div>
    <div class="chart-wrap"><canvas id="mainChart"></canvas></div>

    <!-- Re-injected Events Timeline Block -->
    ${eventsHTML}

    <section style="margin:30px 0;padding:20px;background:var(--bg-2);border-radius:var(--radius-md);border:1px solid var(--border);">
      <h3 style="color:var(--text);margin-bottom:4px;font-size:14px;font-weight:bold;">Public Intent &amp; Behavior Surveillance</h3>
      <p style="font-size:12px;color:var(--text-2);margin-bottom:15px;">Monitoring shifts in information-seeking behavior to isolate genuine symptom awareness from geographic media spikes.</p>

      <div style="display:flex;flex-direction:column;gap:20px;">
        <div style="background:var(--bg);padding:15px;border-radius:var(--radius-md);border:1px solid var(--border);">
          <div class="word-cloud-control-panel">
            <h4 style="font-size:13px;color:var(--text-2);font-weight:600;">Active Symptom Inquiry Profile</h4>
            <select id="word-cloud-period-select" onchange="updateWordCloudView(this.value)">
              <option value="all">All Periods (Combined View)</option>
            </select>
          </div>
          <div id="symptom-word-cloud" class="word-cloud-container"></div>
        </div>
        
        <div style="display:grid; grid-template-columns: 2fr 1fr; gap:15px;">
           <div style="background:var(--bg);padding:15px;border-radius:var(--radius-md);border:1px solid var(--border);height:260px;">
              <h4 style="font-size:12px;color:var(--text-2);font-weight:600;margin-bottom:10px;">Search Intensity Trajectory</h4>
              <div style="height:200px;position:relative;"><canvas id="trendsChart"></canvas></div>
           </div>
           <div style="background:var(--bg);padding:15px;border-radius:var(--radius-md);border:1px solid var(--border);overflow-y:auto;height:260px;">
              <h4 style="font-size:12px;color:var(--text-2);font-weight:600;margin-bottom:10px;">Surging Search Inquiries</h4>
              <div id="rising-queries-list"></div>
           </div>
        </div>
      </div>
    </section>
  `;
}

// ─── WORD CLOUD INJECTION GENERATOR ──────────────────────────────────────────
function updateWordCloudView(selectedDate) {
  const cloudContainer = document.getElementById('symptom-word-cloud');
  if (!cloudContainer) return;

  const data = window.ebolaData;
  if (!data || !data.google_trends_surveillance || !data.google_trends_surveillance.word_cloud) {
    cloudContainer.innerHTML = `<p style="color:var(--text-3);font-size:13px;padding:20px;text-align:center;">
      No word-cloud data available. Run trends.py to populate search logs.
    </p>`;
    return;
  }

  const targetCloud = data.google_trends_surveillance.word_cloud;
  let rawWordsObject = {};

  if (selectedDate === 'all' || !selectedDate) {
    rawWordsObject = targetCloud.all_time || {};
  } else if (targetCloud.periods) {
    rawWordsObject = targetCloud.periods[selectedDate] || {};
  }

  if (!rawWordsObject || Object.keys(rawWordsObject).length === 0) {
    cloudContainer.innerHTML = `<p style="color:var(--text-3);font-size:13px;padding:20px;text-align:center;">No keyword data for this tracking period.</p>`;
    return;
  }

  cloudContainer.innerHTML = '';
  const colors = ['#1f77b4','#aec7e8','#ff7f0e','#ffbb78','#2ca02c','#98df8a','#d62728','#ff9896','#9467bd','#c5b0d5'];
  const dataset = Object.entries(rawWordsObject).map(([word, frequency]) => ({ term: word, volume: frequency }));
  
  const maxVol  = Math.max(...dataset.map(v => v.volume));
  const minVol  = Math.min(...dataset.map(v => v.volume));
  const width   = cloudContainer.offsetWidth || 500;
  const height  = 320;
  const centerX = width  / 2;
  const centerY = height / 2;
  const placed  = [];

  function intersects(x1, y1, w1, h1) {
    for (const ex of placed) {
      if (x1 < ex.x2 && x1 + w1 > ex.x1 && y1 < ex.y2 && y1 + h1 > ex.y1) return true;
    }
    return false;
  }

  dataset.sort((a, b) => b.volume - a.volume).forEach((item, idx) => {
    const scalePct = maxVol === minVol ? 0.5 : (item.volume - minVol) / (maxVol - minVol);
    const fontSize = Math.round(12 + scalePct * 24);

    const span = document.createElement('span');
    span.className   = 'cloud-word';
    span.style.fontSize = `${fontSize}px`;
    span.style.color    = colors[idx % colors.length];
    span.style.position = 'absolute';
    span.textContent    = item.term;
    cloudContainer.appendChild(span);

    const ww = span.offsetWidth || (item.term.length * fontSize * 0.6);
    const wh = span.offsetHeight || (fontSize * 1.2);

    let angle = 0, radius = 0, posX = 0, posY = 0, ok = false;
    while (!ok && radius < Math.max(width, height) * 2) {
      posX = centerX + radius * Math.cos(angle) - ww / 2;
      posY = centerY + radius * Math.sin(angle) - wh / 2;
      if (posX > 0 && posX + ww < width && posY > 0 && posY + wh < height) {
        if (!intersects(posX, posY, ww, wh)) {
          placed.push({ x1: posX, y1: posY, x2: posX + ww, y2: posY + wh });
          ok = true;
        }
      }
      angle  += 0.1;
      radius += 0.1;
    }

    if (ok) {
      span.style.left = `${posX}px`;
      span.style.top  = `${posY}px`;
      span.style.transform = 'none';
    } else {
      span.style.left = `${Math.random() * (width - ww)}px`;
      span.style.top  = `${Math.random() * (height - wh)}px`;
    }
  });
}

// ─── GOOGLE TRENDS CHART RENDERING ENGINE ────────────────────────────────────
function renderGoogleTrends(data) {
  const trendsData = data.google_trends_surveillance;
  if (!trendsData) return;

  const queriesContainer = document.getElementById('rising-queries-list');
  if (queriesContainer) {
    if (trendsData.rising_searches && trendsData.rising_searches.length > 0) {
      let block = `<ul style="margin:0;padding-left:15px;list-style-type:square;line-height:1.6;">`;
      trendsData.rising_searches.forEach(q => {
        const displayVal = q.breakout_value === 'Breakout' ? '🔥 Breakout' : `+${q.breakout_value}%`;
        block += `<li style="margin-bottom:4px;font-size:12px;">"${q.query}" <span style="color:#BA7517;font-weight:bold;">(${displayVal})</span></li>`;
      });
      block += '</ul>';
      queriesContainer.innerHTML = block;
    } else {
      queriesContainer.innerHTML = `<p style="color:#777;font-size:12px;margin:0;">No query surges detected.</p>`;
    }
  }

  const trendsCanvas = document.getElementById('trendsChart');
  if (!trendsCanvas || !trendsData.search_timeline?.Ebola) return;

  const timeLabels = trendsData.search_timeline.Ebola.map(item => item.time.split(' ')[0]);
  const datasets   = [
    {
      label: 'Ebola Searches',
      data: trendsData.search_timeline.Ebola.map(item => item.score),
      borderColor: '#E24B4A', backgroundColor: 'transparent',
      borderWidth: 2, tension: 0.35, pointRadius: 0
    },
    {
      label: 'Transmission',
      data: (trendsData.search_timeline.Transmission || []).map(item => item.score),
      borderColor: '#BA7517', backgroundColor: 'transparent',
      borderWidth: 1.5, borderDash: [4, 4], tension: 0.35, pointRadius: 0
    }
  ];

  new Chart(trendsCanvas.getContext('2d'), {
    type: 'line',
    data: { labels: timeLabels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        x: { ticks: { color: 'var(--text-3)', maxTicksLimit: 6 }, grid: { display: false } },
        y: { min: 0, max: 100, ticks: { color: 'var(--text-3)' }, grid: { color: 'var(--border)' } }
      }
    }
  });
}

// ─── EPIDEMIOLOGICAL TIME-SERIES CHART HELPERS ───────────────────────────────
function buildDailyData(timeline) {
  return timeline.map((pt, i) => ({
    date:   pt.date,
    cases:  i === 0 ? pt.cases  : Math.max(0, pt.cases  - timeline[i - 1].cases),
    deaths: i === 0 ? pt.deaths : Math.max(0, pt.deaths - timeline[i - 1].deaths),
  }));
}

function switchMode(mode) {
  currentMode = mode;
  document.getElementById('btn-cumulative').classList.toggle('active', mode === 'cumulative');
  document.getElementById('btn-daily').classList.toggle('active', mode === 'daily');
  renderChart(mode);
}

function renderChart(mode) {
  if (!chartTimeline || chartTimeline.length === 0) return;

  const canvas = document.getElementById('mainChart');
  if (!canvas) return;

  const isDark  = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const source  = mode === 'cumulative' ? chartTimeline : buildDailyData(chartTimeline);
  const display = mode === 'daily' ? source.slice(1) : source;

  const config = {
    type: mode === 'daily' ? 'bar' : 'line',
    data: {
      labels: display.map(d => d.date),
      datasets: [
        {
          label: mode === 'cumulative' ? 'Confirmed cases' : 'New cases',
          data: display.map(d => d.cases),
          borderColor: '#378ADD',
          backgroundColor: mode === 'daily' ? 'rgba(55,138,221,0.7)' : 'rgba(55,138,221,0.05)',
          fill: mode !== 'daily',
          tension: 0.35,
          pointRadius: mode === 'daily' ? 0 : 4,
          borderWidth: 2
        },
        {
          label: mode === 'cumulative' ? 'Confirmed deaths' : 'New deaths',
          data: display.map(d => d.deaths),
          borderColor: '#E24B4A',
          backgroundColor: mode === 'daily' ? 'rgba(226,75,74,0.75)' : 'rgba(226,75,74,0.03)',
          fill: mode !== 'daily',
          tension: 0.35,
          pointRadius: mode === 'daily' ? 0 : 4,
          borderWidth: 2,
          borderDash: mode === 'daily' ? [] : [4, 4]
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      scales: {
        x: { ticks: { color: 'var(--text-3)', maxTicksLimit: 8 }, grid: { display: false } },
        y: { ticks: { color: 'var(--text-3)' }, grid: { color: 'var(--border)' } }
      }
    }
  };

  if (chartInstance) chartInstance.destroy();
  chartInstance = new Chart(canvas, config);
}

// Kickstart dashboard loading execution sequence on load
document.addEventListener("DOMContentLoaded", initDashboard);
</script>
</body>
</html>
