<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2026 Ebola Outbreak Dashboard — DRC & Uganda</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #ffffff;
      --bg-2:      #f5f5f3;
      --text:      #1a1a18;
      --text-2:    #5f5e5a;
      --text-3:    #88877f;
      --border:    rgba(0,0,0,0.10);
      --border-2:  rgba(0,0,0,0.18);
      --blue:      #378ADD;
      --red:       #E24B4A;
      --amber:     #BA7517;
      --amber-bg:  #faeeda;
      --amber-bdr: #FAC775;
      --radius-md: 8px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:        #1c1c1a;
        --bg-2:      #252523;
        --text:      #f0efea;
        --text-2:    #b4b2a9;
        --text-3:    #888780;
        --border:    rgba(255,255,255,0.09);
        --border-2:  rgba(255,255,255,0.16);
        --amber-bg:  #412402;
        --amber-bdr: #854F0B;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .page { max-width: 900px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }

    .header { margin-bottom: 1.75rem; }
    .header-eyebrow { font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-3); margin-bottom: 4px; }
    .header-title { font-size: 22px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    .header-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .badge { font-size: 11px; color: var(--text-3); background: var(--bg-2); border: 0.5px solid var(--border); border-radius: var(--radius-md); padding: 3px 9px; }
    .badge-red { color: #A32D2D; background: #FCEBEB; border-color: #F7C1C1; }
    @media (prefers-color-scheme: dark) { .badge-red { color: #F09595; background: #501313; border-color: #791F1F; } }

    .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 1.75rem; }
    .metric { background: var(--bg-2); border-radius: var(--radius-md); padding: 1rem; }
    .metric-label { font-size: 12px; color: var(--text-2); margin-bottom: 4px; }
    .metric-value { font-size: 26px; font-weight: 600; color: var(--text); }
    .metric-value.red   { color: var(--red); }
    .metric-value.amber { color: var(--amber); }
    .metric-sub { font-size: 11px; color: var(--text-3); margin-top: 3px; }

    .section-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 0.75rem; }
    .section-sub { font-size: 13px; color: var(--text-2); margin-bottom: 1rem; line-height: 1.6; }
    .section-divider { border: none; border-top: 0.5px solid var(--border); margin: 2rem 0; }

    .legend { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 10px; font-size: 12px; color: var(--text-2); }
    .legend-item { display: flex; align-items: center; gap: 5px; }
    .legend-swatch { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }

    .chart-wrap { position: relative; width: 100%; height: 300px; margin-bottom: 1.75rem; }

    .graph-card { background: var(--bg-2); border-radius: 12px; overflow: hidden; margin-bottom: 1.5rem; }
    #graph-svg { width: 100%; display: block; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 1.75rem; }
    th { text-align: left; font-size: 11px; font-weight: 500; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.05em; padding: 6px 10px; border-bottom: 0.5px solid var(--border); }
    td { padding: 8px 10px; color: var(--text); border-bottom: 0.5px solid var(--border); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--bg-2); }

    .timeline { border-left: 2px solid var(--border-2); margin-left: 8px; padding-left: 16px; display: flex; flex-direction: column; gap: 16px; margin-bottom: 1.75rem; }
    .tl-item { position: relative; }
    .tl-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--border-2); position: absolute; left: -21px; top: 5px; }
    .tl-dot.red { background: var(--red); }
    .tl-date { font-size: 11px; color: var(--text-3); margin-bottom: 2px; }
    .tl-desc { font-size: 13px; color: var(--text); }

    .note { background: var(--amber-bg); border: 0.5px solid var(--amber-bdr); border-radius: var(--radius-md); padding: 12px 14px; font-size: 12px; color: var(--amber); margin-bottom: 1.25rem; line-height: 1.6; }

    .sources { font-size: 12px; color: var(--text-3); margin-bottom: 0.5rem; }
    .links { display: flex; gap: 10px; flex-wrap: wrap; }
    .links a { font-size: 12px; color: var(--blue); text-decoration: none; border: 0.5px solid var(--border); border-radius: var(--radius-md); padding: 5px 10px; }
    .links a:hover { background: var(--bg-2); text-decoration: underline; }

    footer { margin-top: 3rem; padding-top: 1.25rem; border-top: 0.5px solid var(--border); font-size: 11px; color: var(--text-3); }
    .loading { text-align: center; padding: 4rem 0; color: var(--text-3); font-size: 14px; }

    @media (max-width: 500px) {
      .header-title { font-size: 18px; }
      .metric-value { font-size: 22px; }
    }
  </style>
</head>
<body>
<main class="page">
  <div id="app"><div class="loading">Loading outbreak data…</div></div>
</main>

<script>
async function init() {
  let data;
  try {
    const res = await fetch('./data.json');
    if (!res.ok) throw new Error('fetch failed');
    data = await res.json();
  } catch (e) {
    document.getElementById('app').innerHTML = '<div class="loading">Could not load data.json. Make sure it is in the same folder.</div>';
    return;
  }

  const { summary, timeline, healthZones, events, updated } = data;
  const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const divColor = isDark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.08)';

  document.getElementById('app').innerHTML = `
    <div class="header">
      <p class="header-eyebrow">Public health emergency of international concern (PHEIC)</p>
      <h1 class="header-title">2026 Ebola Outbreak — DRC &amp; Uganda</h1>
      <div class="header-meta">
        <span class="badge badge-red">Bundibugyo virus · No vaccine or treatment</span>
        <span class="badge">Data: WHO / CDC · Updated ${updated}</span>
      </div>
    </div>

    <div class="metrics">
      <div class="metric"><p class="metric-label">Suspected cases</p><p class="metric-value">~${summary.suspectedCases.toLocaleString()}</p><p class="metric-sub">as of ${updated}</p></div>
      <div class="metric"><p class="metric-label">Suspected deaths</p><p class="metric-value red">${summary.suspectedDeaths.toLocaleString()}</p><p class="metric-sub">as of ${updated}</p></div>
      <div class="metric"><p class="metric-label">Confirmed (lab)</p><p class="metric-value">${summary.confirmedDRC}</p><p class="metric-sub">DRC + Uganda</p></div>
      <div class="metric"><p class="metric-label">Case fatality rate</p><p class="metric-value amber">~${summary.cfrPercent}%</p><p class="metric-sub">25–50% est. for Bundibugyo</p></div>
      <div class="metric"><p class="metric-label">Uganda cases</p><p class="metric-value">${summary.ugandaCases}</p><p class="metric-sub">${summary.ugandaDeaths} death · Kampala</p></div>
    </div>

    <hr class="section-divider">

    <p class="section-title">Outbreak progression</p>
    <div class="legend">
      <span class="legend-item"><span class="legend-swatch" style="background:#378ADD"></span>Suspected cases</span>
      <span class="legend-item"><span class="legend-swatch" style="background:#E24B4A"></span>Suspected deaths</span>
    </div>
    <div class="chart-wrap">
      <canvas id="mainChart" role="img" aria-label="Line chart showing cumulative suspected Ebola cases and deaths from April to May 2026."></canvas>
    </div>

    <hr class="section-divider">

    <p class="section-title">Transmission &amp; importation network</p>
    <p class="section-sub">Confirmed case transmission chains and contact movements from the epicentre in Ituri Province, DRC. Hover nodes for detail.</p>

    <div class="graph-card">
      <svg id="graph-svg" viewBox="0 0 680 440" preserveAspectRatio="xMidYMid meet"></svg>
    </div>

    <p class="note" style="margin-bottom:1.75rem;">
      <strong>Network note:</strong> Germany represents a <strong>contact transfer</strong>, not confirmed Ebola cases — 1 American healthcare worker and 6 high-risk contacts were medically evacuated for monitoring. The United States has no confirmed cases; enhanced airport screening was implemented as a precaution. DRC health zone case figures are estimates based on WHO reporting proportions.
    </p>

    <hr class="section-divider">

    <p class="section-title">Affected health zones (DRC, Ituri Province)</p>
    <table>
      <thead><tr><th>Health zone</th><th>Health areas affected</th><th>Status</th></tr></thead>
      <tbody>
        ${healthZones.map(z => `<tr><td>${z.name}</td><td>${z.areasAffected ?? '—'}</td><td>${z.status}</td></tr>`).join('')}
      </tbody>
    </table>

    <hr class="section-divider">

    <p class="section-title">Key events</p>
    <div class="timeline">
      ${events.map(e => `
        <div class="tl-item">
          <div class="tl-dot ${e.red ? 'red' : ''}"></div>
          <p class="tl-date">${e.date}</p>
          <p class="tl-desc">${e.desc}</p>
        </div>
      `).join('')}
    </div>

    <p class="note">
      <strong>Data caveat:</strong> All case and death figures are suspected/reported totals. The true number of infections likely considerably exceeds official estimates due to the remote location, ongoing armed conflict in Ituri, limited laboratory capacity, and high population mobility. Sources: WHO Disease Outbreak News (DON602), CDC Situation Summary, May 2026.
    </p>

    <p class="sources">Sources &amp; further reading:</p>
    <div class="links">
      <a href="https://www.who.int/emergencies/disease-outbreak-news/item/2026-DON602" target="_blank" rel="noopener">WHO Disease Outbreak News ↗</a>
      <a href="https://www.cdc.gov/ebola/situation-summary/index.html" target="_blank" rel="noopener">CDC Situation Summary ↗</a>
      <a href="https://www.cdc.gov/han/php/notices/han00530.html" target="_blank" rel="noopener">CDC Health Alert Network ↗</a>
      <a href="https://www.who.int/news/item/17-05-2026-epidemic-of-ebola-disease-in-the-democratic-republic-of-the-congo-and-uganda-determined-a-public-health-emergency-of-international-concern" target="_blank" rel="noopener">WHO PHEIC Declaration ↗</a>
    </div>

    <footer>
      Built with Chart.js · Data: WHO &amp; CDC · Last updated ${updated} · Not a medical resource — consult official health authorities for guidance.
    </footer>
  `;

  // ── LINE CHART ──
  const gridColor = isDark ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.06)';
  const tickColor = isDark ? 'rgba(255,255,255,0.45)' : 'rgba(0,0,0,0.45)';

  new Chart(document.getElementById('mainChart'), {
    type: 'line',
    data: {
      labels: timeline.map(d => d.date),
      datasets: [
        {
          label: 'Suspected cases',
          data: timeline.map(d => d.cases),
          borderColor: '#378ADD',
          backgroundColor: isDark ? 'rgba(55,138,221,0.12)' : 'rgba(55,138,221,0.08)',
          fill: true, tension: 0.35, pointRadius: 5,
          pointBackgroundColor: '#378ADD',
          pointBorderColor: isDark ? '#1c1c1a' : '#ffffff',
          pointBorderWidth: 2, borderWidth: 2,
        },
        {
          label: 'Suspected deaths',
          data: timeline.map(d => d.deaths),
          borderColor: '#E24B4A',
          backgroundColor: isDark ? 'rgba(226,75,74,0.10)' : 'rgba(226,75,74,0.06)',
          fill: true, tension: 0.35, pointRadius: 5,
          pointBackgroundColor: '#E24B4A',
          pointBorderColor: isDark ? '#1c1c1a' : '#ffffff',
          pointBorderWidth: 2, borderWidth: 2, borderDash: [5, 3],
        }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y.toLocaleString()}`,
            footer: items => {
              const c = items[0]?.parsed.y, d = items[1]?.parsed.y;
              if (c && d) return `CFR: ${Math.round((d / c) * 100)}%`;
            }
          }
        }
      },
      scales: {
        x: { grid: { color: gridColor }, ticks: { color: tickColor, font: { size: 11 }, autoSkip: false } },
        y: { grid: { color: gridColor }, ticks: { color: tickColor, font: { size: 11 }, callback: v => v >= 1000 ? (v/1000)+'k' : v }, beginAtZero: true }
      }
    }
  });

  // ── NETWORK CHART (fixed layout, no D3) ──
  document.getElementById('graph-svg').innerHTML = `
    <defs>
      <marker id="arrow-confirmed" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M2 1L8 5L2 9" fill="none" stroke="#A32D2D" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </marker>
      <marker id="arrow-contact" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M2 1L8 5L2 9" fill="none" stroke="#185FA5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </marker>
      <marker id="arrow-alert" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M2 1L8 5L2 9" fill="none" stroke="#534AB7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </marker>
    </defs>

    <text font-size="11" fill="${isDark ? '#888780' : '#88877f'}" x="96"  y="26" text-anchor="middle">DRC origin zones</text>
    <text font-size="11" fill="${isDark ? '#888780' : '#88877f'}" x="338" y="26" text-anchor="middle">Epicentre hub</text>
    <text font-size="11" fill="${isDark ? '#888780' : '#88877f'}" x="574" y="26" text-anchor="middle">International spread</text>

    <line x1="220" y1="18" x2="220" y2="422" stroke="${divColor}" stroke-width="0.5" stroke-dasharray="4 4"/>
    <line x1="458" y1="18" x2="458" y2="422" stroke="${divColor}" stroke-width="0.5" stroke-dasharray="4 4"/>

    <path d="M 178 140 C 250 140, 268 210, 306 212" fill="none" stroke="#A32D2D" stroke-width="1.8" marker-end="url(#arrow-confirmed)"/>
    <path d="M 178 300 C 250 300, 268 226, 306 224" fill="none" stroke="#A32D2D" stroke-width="1.8" marker-end="url(#arrow-confirmed)"/>
    <path d="M 372 200 C 430 175, 476 162, 520 152" fill="none" stroke="#A32D2D" stroke-width="1.8" marker-end="url(#arrow-confirmed)"/>
    <path d="M 372 222 C 430 250, 480 278, 520 288" fill="none" stroke="#185FA5" stroke-width="1.4" stroke-dasharray="6 4" marker-end="url(#arrow-contact)"/>
    <path d="M 372 234 C 430 310, 482 356, 520 368" fill="none" stroke="#534AB7" stroke-width="1.2" stroke-dasharray="2 5" marker-end="url(#arrow-alert)"/>

    <rect x="18"  y="100" width="160" height="80" rx="8" fill="${isDark ? '#501313' : '#FCEBEB'}" stroke="${isDark ? '#791F1F' : '#F7C1C1'}" stroke-width="0.5"/>
    <text font-size="12" font-weight="500" fill="${isDark ? '#F09595' : '#791F1F'}" x="98" y="122" text-anchor="middle" dominant-baseline="central">Rwampara HZ</text>
    <text font-size="11" fill="${isDark ? '#F09595' : '#A32D2D'}" x="98" y="140" text-anchor="middle" dominant-baseline="central">6 health areas · DRC</text>
    <line x1="18" y1="152" x2="178" y2="152" stroke="${isDark ? '#791F1F' : '#F7C1C1'}" stroke-width="0.5"/>
    <text font-size="11" fill="${isDark ? '#F09595' : '#A32D2D'}" x="58"  y="168" text-anchor="middle" dominant-baseline="central">~120 cases</text>
    <text font-size="11" fill="${isDark ? '#F09595' : '#A32D2D'}" x="140" y="168" text-anchor="middle" dominant-baseline="central">est. 40+ deaths</text>

    <rect x="18"  y="260" width="160" height="80" rx="8" fill="${isDark ? '#501313' : '#FCEBEB'}" stroke="${isDark ? '#791F1F' : '#F7C1C1'}" stroke-width="0.5"/>
    <text font-size="12" font-weight="500" fill="${isDark ? '#F09595' : '#791F1F'}" x="98" y="282" text-anchor="middle" dominant-baseline="central">Mongbwalu HZ</text>
    <text font-size="11" fill="${isDark ? '#F09595' : '#A32D2D'}" x="98" y="300" text-anchor="middle" dominant-baseline="central">3 health areas · DRC</text>
    <line x1="18" y1="312" x2="178" y2="312" stroke="${isDark ? '#791F1F' : '#F7C1C1'}" stroke-width="0.5"/>
    <text font-size="11" fill="${isDark ? '#F09595' : '#A32D2D'}" x="58"  y="328" text-anchor="middle" dominant-baseline="central">~90 cases</text>
    <text font-size="11" fill="${isDark ? '#F09595' : '#A32D2D'}" x="140" y="328" text-anchor="middle" dominant-baseline="central">est. 30+ deaths</text>

    <rect x="258" y="160" width="114" height="100" rx="10" fill="${isDark ? '#4A1B0C' : '#FAECE7'}" stroke="${isDark ? '#993C1D' : '#F0997B'}" stroke-width="0.8"/>
    <text font-size="12" font-weight="500" fill="${isDark ? '#F5C4B3' : '#4A1B0C'}" x="315" y="186" text-anchor="middle" dominant-baseline="central">Bunia HZ</text>
    <text font-size="11" fill="${isDark ? '#F0997B' : '#993C1D'}" x="315" y="204" text-anchor="middle" dominant-baseline="central">Epicentre · DRC</text>
    <line x1="258" y1="216" x2="372" y2="216" stroke="${isDark ? '#993C1D' : '#F0997B'}" stroke-width="0.5"/>
    <text font-size="11" fill="${isDark ? '#F0997B' : '#993C1D'}" x="315" y="234" text-anchor="middle" dominant-baseline="central">575 cases</text>
    <text font-size="11" fill="${isDark ? '#F0997B' : '#993C1D'}" x="315" y="250" text-anchor="middle" dominant-baseline="central">148 deaths</text>

    <rect x="520" y="112" width="148" height="80" rx="8" fill="${isDark ? '#412402' : '#FAEEDA'}" stroke="${isDark ? '#854F0B' : '#FAC775'}" stroke-width="0.5"/>
    <text font-size="12" font-weight="500" fill="${isDark ? '#FAC775' : '#412402'}" x="594" y="134" text-anchor="middle" dominant-baseline="central">Kampala, Uganda</text>
    <text font-size="11" fill="${isDark ? '#EF9F27' : '#854F0B'}" x="594" y="152" text-anchor="middle" dominant-baseline="central">Confirmed import</text>
    <line x1="520" y1="164" x2="668" y2="164" stroke="${isDark ? '#854F0B' : '#FAC775'}" stroke-width="0.5"/>
    <text font-size="11" fill="${isDark ? '#EF9F27' : '#854F0B'}" x="560" y="180" text-anchor="middle" dominant-baseline="central">2 cases</text>
    <text font-size="11" fill="${isDark ? '#EF9F27' : '#854F0B'}" x="634" y="180" text-anchor="middle" dominant-baseline="central">1 death</text>

    <rect x="520" y="258" width="148" height="80" rx="8" fill="${isDark ? '#042C53' : '#E6F1FB'}" stroke="${isDark ? '#185FA5' : '#B5D4F4'}" stroke-width="0.5"/>
    <text font-size="12" font-weight="500" fill="${isDark ? '#B5D4F4' : '#042C53'}" x="594" y="280" text-anchor="middle" dominant-baseline="central">Germany</text>
    <text font-size="11" fill="${isDark ? '#85B7EB' : '#185FA5'}" x="594" y="298" text-anchor="middle" dominant-baseline="central">Medical evacuation</text>
    <line x1="520" y1="310" x2="668" y2="310" stroke="${isDark ? '#185FA5' : '#B5D4F4'}" stroke-width="0.5"/>
    <text font-size="11" fill="${isDark ? '#85B7EB' : '#185FA5'}" x="560" y="326" text-anchor="middle" dominant-baseline="central">7 contacts</text>
    <text font-size="11" fill="${isDark ? '#85B7EB' : '#185FA5'}" x="634" y="326" text-anchor="middle" dominant-baseline="central">0 deaths</text>

    <rect x="520" y="348" width="148" height="68" rx="8" fill="${isDark ? '#26215C' : '#EEEDFE'}" stroke="${isDark ? '#534AB7' : '#CECBF6'}" stroke-width="0.5"/>
    <text font-size="12" font-weight="500" fill="${isDark ? '#CECBF6' : '#26215C'}" x="594" y="370" text-anchor="middle" dominant-baseline="central">United States</text>
    <text font-size="11" fill="${isDark ? '#AFA9EC' : '#534AB7'}" x="594" y="388" text-anchor="middle" dominant-baseline="central">Enhanced screening</text>
    <line x1="520" y1="400" x2="668" y2="400" stroke="${isDark ? '#534AB7' : '#CECBF6'}" stroke-width="0.5"/>
    <text font-size="11" fill="${isDark ? '#AFA9EC' : '#534AB7'}" x="594" y="412" text-anchor="middle" dominant-baseline="central">0 cases · 0 deaths</text>

    <line x1="30"  y1="430" x2="58"  y2="430" stroke="#A32D2D" stroke-width="1.8"/>
    <text font-size="11" fill="${isDark ? '#888780' : '#88877f'}" x="64"  y="434">Confirmed cases</text>
    <line x1="196" y1="430" x2="224" y2="430" stroke="#185FA5" stroke-width="1.4" stroke-dasharray="6 4"/>
    <text font-size="11" fill="${isDark ? '#888780' : '#88877f'}" x="230" y="434">Contact transfer</text>
    <line x1="354" y1="430" x2="382" y2="430" stroke="#534AB7" stroke-width="1.2" stroke-dasharray="2 5"/>
    <text font-size="11" fill="${isDark ? '#888780' : '#88877f'}" x="388" y="434">Alert / screening</text>
  `;
}

init();
</script>
</body>
</html>
