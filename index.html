<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2026 Ebola Outbreak Dashboard — DRC & Uganda</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #ffffff;
      --bg-2:      #f5f5f3;
      --bg-3:      #eeecea;
      --text:      #1a1a18;
      --text-2:    #5f5e5a;
      --text-3:    #88877f;
      --border:    rgba(0,0,0,0.10);
      --border-2:  rgba(0,0,0,0.18);
      --blue:      #378ADD;
      --red:       #E24B4A;
      --amber:     #BA7517;
      --amber-bg:  #faeeda;
      --amber-bdr: #FAC775;
      --radius-md: 8px;
      --radius-lg: 12px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:        #1c1c1a;
        --bg-2:      #252523;
        --bg-3:      #2e2e2c;
        --text:      #f0efea;
        --text-2:    #b4b2a9;
        --text-3:    #888780;
        --border:    rgba(255,255,255,0.09);
        --border-2:  rgba(255,255,255,0.16);
        --amber-bg:  #412402;
        --amber-bdr: #854F0B;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .page { max-width: 860px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }

    .header { margin-bottom: 1.75rem; }
    .header-eyebrow {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 4px;
    }
    .header-title { font-size: 22px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    .header-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .badge {
      font-size: 11px;
      color: var(--text-3);
      background: var(--bg-2);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-md);
      padding: 3px 9px;
    }
    .badge-red { color: #A32D2D; background: #FCEBEB; border-color: #F7C1C1; }
    @media (prefers-color-scheme: dark) {
      .badge-red { color: #F09595; background: #501313; border-color: #791F1F; }
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px;
      margin-bottom: 1.75rem;
    }
    .metric { background: var(--bg-2); border-radius: var(--radius-md); padding: 1rem; }
    .metric-label { font-size: 12px; color: var(--text-2); margin-bottom: 4px; }
    .metric-value { font-size: 26px; font-weight: 600; color: var(--text); }
    .metric-value.red   { color: var(--red); }
    .metric-value.amber { color: var(--amber); }
    .metric-sub { font-size: 11px; color: var(--text-3); margin-top: 3px; }

    .section-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 0.75rem; }

    .legend { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 10px; font-size: 12px; color: var(--text-2); }
    .legend-item { display: flex; align-items: center; gap: 5px; }
    .legend-swatch { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }

    .chart-wrap { position: relative; width: 100%; height: 300px; margin-bottom: 1.75rem; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 1.75rem; }
    th {
      text-align: left;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 6px 10px;
      border-bottom: 0.5px solid var(--border);
    }
    td { padding: 8px 10px; color: var(--text); border-bottom: 0.5px solid var(--border); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--bg-2); }

    .timeline {
      border-left: 2px solid var(--border-2);
      margin-left: 8px;
      padding-left: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 1.75rem;
    }
    .tl-item { position: relative; }
    .tl-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: var(--border-2);
      position: absolute;
      left: -21px; top: 5px;
    }
    .tl-dot.red { background: var(--red); }
    .tl-date { font-size: 11px; color: var(--text-3); margin-bottom: 2px; }
    .tl-desc { font-size: 13px; color: var(--text); }

    .note {
      background: var(--amber-bg);
      border: 0.5px solid var(--amber-bdr);
      border-radius: var(--radius-md);
      padding: 12px 14px;
      font-size: 12px;
      color: var(--amber);
      margin-bottom: 1.25rem;
      line-height: 1.6;
    }

    .sources { font-size: 12px; color: var(--text-3); margin-bottom: 0.5rem; }
    .links { display: flex; gap: 10px; flex-wrap: wrap; }
    .links a {
      font-size: 12px;
      color: var(--blue);
      text-decoration: none;
      border: 0.5px solid var(--border);
      border-radius: var(--radius-md);
      padding: 5px 10px;
    }
    .links a:hover { background: var(--bg-2); text-decoration: underline; }

    footer {
      margin-top: 3rem;
      padding-top: 1.25rem;
      border-top: 0.5px solid var(--border);
      font-size: 11px;
      color: var(--text-3);
    }

    .loading {
      text-align: center;
      padding: 4rem 0;
      color: var(--text-3);
      font-size: 14px;
    }

    @media (max-width: 500px) {
      .header-title { font-size: 18px; }
      .metric-value { font-size: 22px; }
    }
  </style>
</head>
<body>
<main class="page">
  <div id="app"><div class="loading">Loading outbreak data…</div></div>
</main>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script>
async function init() {
  let data;
  try {
    const res = await fetch('./data.json');
    if (!res.ok) throw new Error('fetch failed');
    data = await res.json();
  } catch (e) {
    document.getElementById('app').innerHTML =
      '<div class="loading">Could not load data.json. Make sure it is in the same folder.</div>';
    return;
  }

  const { summary, timeline, healthZones, events, updated } = data;

  document.getElementById('app').innerHTML = `

    <div class="header">
      <p class="header-eyebrow">Public health emergency of international concern (PHEIC)</p>
      <h1 class="header-title">2026 Ebola Outbreak — DRC &amp; Uganda</h1>
      <div class="header-meta">
        <span class="badge badge-red">Bundibugyo virus · No vaccine or treatment</span>
        <span class="badge">Data: WHO / CDC · Updated ${updated}</span>
      </div>
    </div>

    <div class="metrics">
      <div class="metric">
        <p class="metric-label">Suspected cases</p>
        <p class="metric-value">~${summary.suspectedCases.toLocaleString()}</p>
        <p class="metric-sub">as of ${updated}</p>
      </div>
      <div class="metric">
        <p class="metric-label">Suspected deaths</p>
        <p class="metric-value red">${summary.suspectedDeaths.toLocaleString()}</p>
        <p class="metric-sub">as of ${updated}</p>
      </div>
      <div class="metric">
        <p class="metric-label">Confirmed (DRC)</p>
        <p class="metric-value">${summary.confirmedDRC}</p>
        <p class="metric-sub">lab-confirmed</p>
      </div>
      <div class="metric">
        <p class="metric-label">Case fatality rate</p>
        <p class="metric-value amber">~${summary.cfrPercent}%</p>
        <p class="metric-sub">25–50% est. for Bundibugyo</p>
      </div>
      <div class="metric">
        <p class="metric-label">Uganda cases</p>
        <p class="metric-value">${summary.ugandaCases}</p>
        <p class="metric-sub">${summary.ugandaDeaths} death · Kampala</p>
      </div>
    </div>

    <p class="section-title">Outbreak progression</p>
    <div class="legend">
      <span class="legend-item"><span class="legend-swatch" style="background:#378ADD"></span>Suspected cases</span>
      <span class="legend-item"><span class="legend-swatch" style="background:#E24B4A"></span>Suspected deaths</span>
    </div>
    <div class="chart-wrap">
      <canvas id="mainChart" role="img"
        aria-label="Line chart showing cumulative suspected Ebola cases and deaths from April to May 2026.">
      </canvas>
    </div>

    <p class="section-title">Affected health zones (DRC, Ituri Province)</p>
    <table>
      <thead>
        <tr>
          <th>Health zone</th>
          <th>Health areas affected</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody>
        ${healthZones.map(z => `
          <tr>
            <td>${z.name}</td>
            <td>${z.areasAffected ?? '—'}</td>
            <td>${z.status}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>

    <p class="section-title">Key events</p>
    <div class="timeline">
      ${events.map(e => `
        <div class="tl-item">
          <div class="tl-dot ${e.red ? 'red' : ''}"></div>
          <p class="tl-date">${e.date}</p>
          <p class="tl-desc">${e.desc}</p>
        </div>
      `).join('')}
    </div>

    <p class="note">
      <strong>Data caveat:</strong> All case and death figures are suspected/reported totals.
      The true number of infections likely considerably exceeds official estimates due to the remote location,
      ongoing armed conflict in Ituri, limited laboratory capacity, and high population mobility.
      Early pre-declaration figures (Apr 20, May 5) are partially reconstructed from reporting.
      Sources: WHO Disease Outbreak News (DON602), CDC Situation Summary, Al Jazeera / WHO press conference May 20, 2026.
    </p>

    <p class="section-title">More analysis</p>
    <div class="links" style="margin-bottom:1.5rem;">
      <a href="./network.html" style="background:var(--blue);color:#fff;border-color:var(--blue);">🔗 View transmission network chart →</a>
    </div>

    <p class="sources">Sources &amp; further reading:</p>
    <div class="links">
      <a href="https://www.who.int/emergencies/disease-outbreak-news/item/2026-DON602" target="_blank" rel="noopener">WHO Disease Outbreak News ↗</a>
      <a href="https://www.cdc.gov/ebola/situation-summary/index.html" target="_blank" rel="noopener">CDC Situation Summary ↗</a>
      <a href="https://www.cdc.gov/han/php/notices/han00530.html" target="_blank" rel="noopener">CDC Health Alert Network ↗</a>
      <a href="https://www.who.int/news/item/17-05-2026-epidemic-of-ebola-disease-in-the-democratic-republic-of-the-congo-and-uganda-determined-a-public-health-emergency-of-international-concern" target="_blank" rel="noopener">WHO PHEIC Declaration ↗</a>
    </div>

    <footer>
      Built with Chart.js · Data sourced from WHO &amp; CDC · Last updated ${updated} ·
      This is not a medical resource — consult official health authorities for guidance.
    </footer>
  `;

  const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const gridColor = isDark ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.06)';
  const tickColor = isDark ? 'rgba(255,255,255,0.45)' : 'rgba(0,0,0,0.45)';

  new Chart(document.getElementById('mainChart'), {
    type: 'line',
    data: {
      labels: timeline.map(d => d.date),
      datasets: [
        {
          label: 'Suspected cases',
          data: timeline.map(d => d.cases),
          borderColor: '#378ADD',
          backgroundColor: isDark ? 'rgba(55,138,221,0.12)' : 'rgba(55,138,221,0.08)',
          fill: true,
          tension: 0.35,
          pointRadius: 5,
          pointBackgroundColor: '#378ADD',
          pointBorderColor: isDark ? '#1c1c1a' : '#ffffff',
          pointBorderWidth: 2,
          borderWidth: 2,
        },
        {
          label: 'Suspected deaths',
          data: timeline.map(d => d.deaths),
          borderColor: '#E24B4A',
          backgroundColor: isDark ? 'rgba(226,75,74,0.10)' : 'rgba(226,75,74,0.06)',
          fill: true,
          tension: 0.35,
          pointRadius: 5,
          pointBackgroundColor: '#E24B4A',
          pointBorderColor: isDark ? '#1c1c1a' : '#ffffff',
          pointBorderWidth: 2,
          borderWidth: 2,
          borderDash: [5, 3],
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y.toLocaleString()}`,
            footer: items => {
              const c = items[0]?.parsed.y;
              const d = items[1]?.parsed.y;
              if (c && d) return `CFR: ${Math.round((d / c) * 100)}%`;
            }
          }
        }
      },
      scales: {
        x: {
          grid: { color: gridColor },
          ticks: { color: tickColor, font: { size: 11 }, autoSkip: false }
        },
        y: {
          grid: { color: gridColor },
          ticks: {
            color: tickColor,
            font: { size: 11 },
            callback: v => v >= 1000 ? (v / 1000) + 'k' : v
          },
          beginAtZero: true
        }
      }
    }
  });
}

init();
</script>
</body>
</html>
